                --rerun-tasks --info
          - suite: index-management-slm-secure
            name: Index management SLM secure tests
            report_name: index-management-slm-secure
            report_dirs: $GITHUB_WORKSPACE/$PNAME/modules/index-management/build/reports/tests/integTest
