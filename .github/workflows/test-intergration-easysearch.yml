    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup bootstrap
        uses: ./containers/bootstrap

      - name: Run connect in background
        run: |
          connect -c "$GITHUB_WORKSPACE/.net.json" >/dev/null 2>&1 &
          sleep 5

      - name: Set up java toolchain
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ needs.setup.outputs.java_version }}

      - name: Restore Gradle wrapper
        uses: actions/cache/restore@v5
        with:
          path: ~/.gradle/wrapper
          key: gradle-wrapper-${{ runner.os }}-${{ needs.setup.outputs.gradle_version }}
          restore-keys: gradle-wrapper-${{ runner.os }}-

      - name: Restore Gradle dependencies
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.gradle/caches
            /root/.gradle/caches
          key: ${{ needs.setup.outputs.cache_key }}
          restore-keys: |
            gradle-deps-${{ runner.os }}-${{ env.JAVA_DISTRIBUTION }}-${{ needs.setup.outputs.java_version }}-
            gradle-deps-${{ runner.os }}-${{ env.JAVA_DISTRIBUTION }}-
            gradle-deps-${{ runner.os }}-

      - name: Restore JDK toolchains
        uses: actions/cache/restore@v5
        with:
          path: ${{ github.workspace }}/jdks
          key: jdks-${{ runner.os }}-${{ env.JAVA_DISTRIBUTION }}-${{ needs.setup.outputs.java_version }}
          restore-keys: jdks-${{ runner.os }}-${{ env.JAVA_DISTRIBUTION }}-

      - name: Set up gradle
        run: |
          GRADLE_VERSION=${{ needs.setup.outputs.gradle_version }}
          if [[ ! -d "$HOME/gradle-$GRADLE_VERSION" ]]; then
            wget https://services.gradle.org/distributions/gradle-$GRADLE_VERSION-bin.zip -P $HOME
            cd $HOME && unzip -q gradle-$GRADLE_VERSION-bin.zip && rm -rf gradle-$GRADLE_VERSION-bin.zip
          fi
          echo "PATH=$HOME/gradle-$GRADLE_VERSION/bin:$PATH" >> "$GITHUB_ENV"
          echo "BRANCH=${{ needs.setup.outputs.branch }}"           >> "$GITHUB_ENV"
          echo "STEP_VERSION=${{ needs.setup.outputs.step_version }}" >> "$GITHUB_ENV"

      - name: Checkout ${{ env.PNAME }} repo
        env:
          BRANCH: ${{ needs.setup.outputs.branch }}
        run: |
          git clone \
            --depth 1 \
            --no-tags \
            --branch "$BRANCH" \
            --single-branch \
            --recurse-submodules=no \
            $SSH_GIT_REPO/$PNAME $GITHUB_WORKSPACE/$PNAME
          cd $GITHUB_WORKSPACE/$PNAME && echo "Checkout $PNAME repo $(git log -1 --pretty=format:'%h, %ad' --date=iso)"

      - name: Set up pnpm & nodejs
        uses: pnpm/action-setup@v6
        with:
          version: latest
          package_json_file: "${{ env.PNAME }}/package.json"

      - name: Set up nodejs toolchain
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODEJS_VERSION }}
          check-latest: false

      - name: Prepare env
        run: |
          cd $GITHUB_WORKSPACE/$PNAME
          $GITHUB_WORKSPACE/products/$PNAME/init-release.sh
          echo "PLUGIN_HOME=$GITHUB_WORKSPACE/$PNAME/plugins" >> "$GITHUB_ENV"

      - name: Run ${{ matrix.name }}
        timeout-minutes: ${{ matrix.timeout_minutes }}
        env:
          RULEDB_LICENSE: ${{ secrets.RULEDB_LICENSE }}
        run: |
          cd "$GITHUB_WORKSPACE/$PNAME"
          set +e

          MAX_RETRY=3
          RETRY=0
          exit_code=1

          while [ $RETRY -lt $MAX_RETRY ]; do
            echo "==> Running ${{ matrix.name }}, attempt $((RETRY+1))/$MAX_RETRY ..."
            ${{ matrix.command }}
            exit_code=$?
            [ $exit_code -eq 0 ] && break
            RETRY=$((RETRY+1))
            [ $RETRY -lt $MAX_RETRY ] && { echo "==> Retrying in 30s ..."; sleep 30; }
          done

          set -e

          test_name="${{ matrix.report_name }}"
          target_dir="$GITHUB_WORKSPACE/all-test-reports/$test_name-tests"
          copied=0

          IFS='|' read -r -a report_dirs <<< "${{ matrix.report_dirs }}"
          for report_dir in "${report_dirs[@]}"; do
            if [ -d "$report_dir" ]; then
              mkdir -p "$target_dir"
              cp -r "$report_dir"/* "$target_dir"/ || true
              echo "Copied $test_name reports from $report_dir"
              copied=1
            fi
          done
          [ "$copied" -eq 0 ] && echo "No reports copied for $test_name"

          exit "$exit_code"

      - name: Upload ${{ matrix.name }} test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports-${{ matrix.report_name }}
          path: all-test-reports/
          retention-days: 1
          if-no-files-found: warn
          include-hidden-files: true

  collect_test_reports:
    name: Collect Test Reports
    runs-on: ubuntu-latest
    needs: [publish]
    if: always()
    steps:
      - name: Download split test reports
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          pattern: test-reports-*
          path: all-test-reports
          merge-multiple: true

      - name: Check merged reports
        id: check_reports
        run: |
          if [ -d all-test-reports ] && find all-test-reports -mindepth 1 -print -quit | grep -q .; then
            echo "has_reports=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_reports=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload merged test reports
        if: steps.check_reports.outputs.has_reports == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: all-test-reports
          path: all-test-reports/
          retention-days: 1
          if-no-files-found: error
          include-hidden-files: true

  notify_on_failure:
    runs-on: ubuntu-latest
    needs: [publish, collect_test_reports]
    if: ${{ always() && needs.publish.result == 'failure' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Notify message via feishu
        env:
          FEISHU_BOT_URL: ${{ secrets.FEISHU_BOT_WEBHOOK_URL }}
          REPO_NAME: ${{ github.repository }}
          WORKFLOW_NAME: ${{ github.workflow }}
          RUN_ID: ${{ github.run_id }}
          ACTOR: ${{ github.triggering_actor }}
          SERVER_URL: ${{ github.server_url }}
        run: $GITHUB_WORKSPACE/scripts/feishu_message.sh
