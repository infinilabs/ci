name: Testing Products Files (Linux)
defaults:
  run:
    shell: bash
env:
  TZ: Asia/Shanghai
  GO_VERSION: ${{ vars.GO_VERSION }}
  NODEJS_VERSION: ${{ vars.NODEJS_VERSION }}
  NODEJS_EXT_VERSION: ${{ vars.NODEJS_EXT_VERSION }}
  PRE_RELEASE: ${{ vars.PRE_RELEASE }}
  RELEASE_URL: ${{ vars.RELEASE_URL }}
  NODE_OPTIONS: "--max-old-space-size=8192"
  AGENT_PUBLISH_VERSION: ${{ inputs.AGENT_PUBLISH_VERSION }}
  CONSOLE_PUBLISH_VERSION: ${{ inputs.CONSOLE_PUBLISH_VERSION }}
  GATEWAY_PUBLISH_VERSION: ${{ inputs.GATEWAY_PUBLISH_VERSION }}
  LOADGEN_PUBLISH_VERSION: ${{ inputs.LOADGEN_PUBLISH_VERSION }}
  
on:
  workflow_dispatch:
    inputs:
      AGENT_PUBLISH:
        description: 'Agent'
        required: false
        type: boolean
        default: true
      AGENT_PUBLISH_VERSION:
        description: 'Publish Agent Version'
        required: false
        default: "1.0.0"
      CONSOLE_PUBLISH:
        description: 'Console'
        required: false
        type: boolean
        default: true
      CONSOLE_PUBLISH_VERSION:
        description: 'Publish Console Version'
        required: false
        default: "1.0.0"
      GATEWAY_PUBLISH:
        description: 'Gateway'
        required: false
        type: boolean
        default: true
      GATEWAY_PUBLISH_VERSION:
        description: 'Publish Gateway Version'
        required: false
        default: "1.0.0"
      LOADGEN_PUBLISH:
        description: 'Loadgen'
        required: false
        type: boolean
        default: true
      LOADGEN_PUBLISH_VERSION:
        description: 'Publish Loadgen Version'
        required: false
        default: "1.0.0"
      PUBLISH_RELEASE:
        description: 'Publish Release'
        required: false
        type: boolean
        default: true      

jobs:
  generate-matrix: 
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen-matrix.outputs.matrix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Generate matrix
        id: gen-matrix
        env:
            AGENT_PUBLISH: ${{ inputs.AGENT_PUBLISH }}
            CONSOLE_PUBLISH: ${{ inputs.CONSOLE_PUBLISH }}
            GATEWAY_PUBLISH: ${{ inputs.GATEWAY_PUBLISH }}
            LOADGEN_PUBLISH: ${{ inputs.LOADGEN_PUBLISH }}
            AGENT_PUBLISH_VERSION: ${{ env.AGENT_PUBLISH_VERSION }}
            CONSOLE_PUBLISH_VERSION: ${{ env.CONSOLE_PUBLISH_VERSION }}
            GATEWAY_PUBLISH_VERSION: ${{ env.GATEWAY_PUBLISH_VERSION }}
            LOADGEN_PUBLISH_VERSION: ${{ env.LOADGEN_PUBLISH_VERSION }}
        run: |
          matrix=$($GITHUB_WORKSPACE/scripts/go-matrix.sh)
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          cat "$GITHUB_OUTPUT"

  publish:
    needs: generate-matrix
    name: Publish ${{ matrix.product }} with ${{ matrix.publish_version }}
    runs-on: ubuntu-latest
    env:
        OSS_EP: ${{ secrets.OSS_EP }}
        OSS_AK: ${{ secrets.OSS_AK }}
        OSS_SK: ${{ secrets.OSS_SK }}
        OSS_BK: ${{ secrets.OSS_BK }}
        OSS_MODE: ${{ secrets.OSS_MODE }}
        LOCAL_HOST: ${{ secrets.LOCAL_HOST }}
        LOCAL_PORT: ${{ secrets.LOCAL_PORT }}
        SSH_GIT_REPO: ${{ secrets.SSH_GIT_REPO }}
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        SSH_GITEA_PRIVATE_KEY: ${{ secrets.SSH_GITEA_PRIVATE_KEY }}
        SSH_CONFIG: ${{ secrets.SSH_CONFIG }}
        CONNECT_SERVER: ${{ secrets.CONNECT_SERVER }}
        CONNECT_PORT: ${{ secrets.CONNECT_PORT }}
        CONNECT_KEY: ${{ secrets.CONNECT_KEY }}
        CONNECT_TIMEOUT: ${{ vars.CONNECT_TIMEOUT }}
        CONNECT_MODE: ${{ vars.CONNECT_MODE }}
        CONNECT_METHOD: ${{ secrets.CONNECT_METHOD }}
        PRODUCT: ${{ matrix.product }}
        PUBLISH_VERSION: ${{ matrix.publish_version }}
        TARGETS: linux-amd64 linux-arm64
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup bootstrap
        uses: ./containers/bootstrap

      - name: Checkout framework code
        uses: actions/checkout@v6
        with: 
          repository: ${{ vars.GIT_REPO }}/framework
          ref: main
          path: framework

      - name: Checkout ${{ matrix.product }} code
        uses: actions/checkout@v6
        with: 
          repository: ${{ vars.GIT_REPO }}/${{ matrix.product }}
          ref: main
          path: ${{ matrix.product }}

      - name: Setup ${{ matrix.product }} env
        run: |
          source $GITHUB_WORKSPACE/scripts/go-init.sh
          if [[ "$(echo "${{ vars.PRE_RELEASE }}" | tr '[:upper:]' '[:lower:]')" == "true" ]]; then
            grep -wq "pre" $GITHUB_WORKSPACE/.oss.yml || echo "pre: true" >> $GITHUB_WORKSPACE/.oss.yml
          fi
          echo WORK=$WORK >> $GITHUB_ENV
          echo WORKBASE=$WORKBASE >> $GITHUB_ENV
          echo PNAME=${{ matrix.product }} >> $GITHUB_ENV
          echo PATH=$PATH:$GITHUB_WORKSPACE/tools >> $GITHUB_ENV

      - name: Setup ${{ matrix.product }} go toolchain
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: false
          cache: true
          cache-dependency-path: "**/*.sum"

      - name: Check ${{ matrix.product }} go toolchain
        run: go version && go env

      - name: Set up Node.js for ${{ matrix.product }}
        if: matrix.product == 'agent' || matrix.product == 'console'
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.product == 'agent' && env.NODEJS_EXT_VERSION || env.NODEJS_VERSION }}
          cache: 'npm'
          cache-dependency-path: "**/package.json"

      - name: Setup pnpm (agent only)
        if: matrix.product == 'agent'
        uses: pnpm/action-setup@v6
        with:
          version: latest

      - name: Setup cnpm (console only)
        if: matrix.product == 'console'
        run: |
          npm install -g rimraf
          npm install -g cnpm@9.2.0

      - name: Verify toolchain for ${{ matrix.product }}
        if: matrix.product == 'agent' || matrix.product == 'console'
        run: |
          node -v && npm -v
          if [[ "${{ matrix.product }}" == "agent" ]]; then
            pnpm -v
          elif [[ "${{ matrix.product }}" == "console" ]]; then
            cnpm -v
          fi

      - name: Prepare ${{ matrix.product }} build code
        run: |
          cd $WORK/$PNAME
          echo "Build $PNAME at $PWD"
          PUBLISH_RELEASE="${{ inputs.PUBLISH_RELEASE || vars.PUBLISH_RELEASE || 'FALSE' }}"
          if [[ "$(echo "$PUBLISH_RELEASE" | tr '[:upper:]' '[:lower:]')" == "true" ]]; then
            if [[ "$PUBLISH_VERSION" == *-* ]]; then
              IFS=- read -r DYNAMIC_VERSION DYNAMIC_BUILD_NUMBER <<< "$PUBLISH_VERSION"
            else
              RUN_NUMBER=${{ github.run_number }}
              OFFSET=${{ vars.OFFSET }}
              DYNAMIC_BUILD_NUMBER=$((RUN_NUMBER + OFFSET))
              DYNAMIC_VERSION="$PUBLISH_VERSION"
            fi
          else
            DYNAMIC_BUILD_NUMBER=$(date +%Y%m%d)
            DYNAMIC_VERSION=$(echo "$PUBLISH_VERSION" | awk -F. -v OFS=. '{ $2 = $2 + 1; $3 = 0; print $1, $2, $3 "_NIGHTLY" }')
            if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
              DYNAMIC_VERSION=$(echo "$PUBLISH_VERSION" | awk -F. -v OFS=. '{ $2 = $2 + 1; $3 = 0; print $1, $2, $3 "_SNAPSHOT" }')
              RUN_NUMBER=${{ github.run_number }}
              OFFSET=${{ vars.OFFSET }}
              DYNAMIC_BUILD_NUMBER=$((RUN_NUMBER + OFFSET))
            fi
          fi
          echo "Build $PNAME with $DYNAMIC_VERSION-$DYNAMIC_BUILD_NUMBER"

          echo VERSION=$DYNAMIC_VERSION >> $GITHUB_ENV
          echo BUILD_NUMBER=$DYNAMIC_BUILD_NUMBER >> $GITHUB_ENV
          echo EOL=$(date -u -d "1 year" +"%Y-12-31T10:10:10Z") >> $GITHUB_ENV
          echo BUILD_DATE=$(date '+%Y-%m-%d %H:%M:%S') >> $GITHUB_ENV

      - name: Run connect in background for ${{ matrix.product }} web
        run: |
          connect -c "$GITHUB_WORKSPACE/.net.json" >/dev/null 2>&1 &
          echo "Connect started with pid $!"
          sleep 5

      - name: Checkout depends repo code for ${{ matrix.product }} web
        if: ${{ matrix.product == 'agent' }}
        env:
          BRANCH: main
        run: |
          git clone --depth 1 --branch "$BRANCH" --sparse ${{ secrets.SSH_GIT_REPO }}/easysearch $WORK/easysearch
          (cd $WORK/easysearch && git sparse-checkout set plugins/ui)
          # init license and enterprise plugins
          git clone git@github.com:infinilabs/license $WORK/license
          git clone git@github.com:infinilabs/agent-enterprise-plugin.git $WORK/agent/plugin/enterprise
          git clone git@github.com:infinilabs/framework-enterprise-plugins.git $WORK/framework/plugins/enterprise

      - name: Build ui for ${{ matrix.product }} web
        if: ${{ matrix.product == 'agent' }}
        run: |
          SRC=$WORK/easysearch/plugins/ui/web
          DEST=$WORK/easysearch/plugins/ui/_ui
          (cd $SRC && pnpm i && pnpm run build:agent )
          if [ -d $DEST ]; then
            mv $DEST $WORK/agent/.public
          fi

      - name: Build ${{ matrix.product }} with ${{ env.VERSION }}-${{ env.BUILD_NUMBER }}
        run: |
          # for agent web
          if [[ "${{ matrix.product }}" == "agent" ]]; then
            cd $WORK/$PNAME && mkdir -p .public && make update-vfs
          fi
          # for console web
          if [[ "${{ matrix.product }}" == "console" ]]; then
            cd $WORK/$PNAME/web && cnpm install --quiet --no-progress && cnpm run build --quiet
          fi
          
          # build all targets
          for tag in $TARGETS; do
            cd $WORK/$PNAME && make build-$tag
          done

      - name: Build ${{ matrix.product }} check
        run: |
          ls -lrt $WORK/$PNAME/bin
          for tag in $TARGETS; do
            IFS='-' read -r p1 p2 <<< "$tag"
            TAG="$(echo $p1|sed 's/darwin/mac/;s/win/windows/')-$p2"
            [[ "$p1" == "win" ]] && TAG="$TAG.exe"
            [ -f "$WORK/$PNAME/bin/$PNAME-$TAG" ] || { echo "Build $PNAME failed with not found $PNAME-$TAG" && exit 1; }
          done

      - name: Build ${{ matrix.product }} License and notice process
        run: |
          cp -rf $WORK/$PNAME/config $WORK/$PNAME/bin
          find $WORK/$PNAME/bin -name "*.go" -delete
          if [[ "${{ matrix.product }}" == "console" ]]; then
            PERMJSON=$WORK/$PNAME/modules/security/realm/authc/native/permission.json
            if [[ -e $PERMJSON ]]; then
              cp -rf $PERMJSON $WORK/$PNAME/bin/config
            fi
          fi
          cp -rf $WORK/framework/LICENSE $WORK/$PNAME/bin && cat $WORK/framework/NOTICE $WORK/$PNAME/NOTICE > $WORK/$PNAME/bin/NOTICE
          ls -lrt $WORK/$PNAME/bin

      - name: Archive ${{ matrix.product }} files
        run: |
          cd $WORK/$PNAME/bin

          EXTRA_FILES=""
          if [[ "$PNAME" == "loadgen" ]]; then
            echo "Collecting .dsl files for loadgen examples..."
            mkdir -p examples
            find $WORK/$PNAME -type f -name "*.dsl" -exec cp {} examples/ \;
            if [ "$(ls -A examples)" ]; then
               EXTRA_FILES="examples"
            fi
          fi

          for tag in $TARGETS; do
            IFS='-' read -r p1 p2 <<< "$tag"
            TAG="$(echo $p1|sed 's/darwin/mac/;s/win/windows/')-$p2"
            EXT=$TAG
            [[ "$p1" == "win" ]] && EXT="$TAG.exe"

            echo "Archive $PNAME-$p1-$p2 with [ VERSION $VERSION | BUILD_NUMBER $BUILD_NUMBER ] at $BUILD_DATE"
            BASE_FILES="$PNAME-$EXT $PNAME.yml LICENSE NOTICE config"
            if [[ "$p1" == "win" ]] || [[ "$p1" == "darwin" ]]; then
              zip -qr $WORK/$PNAME-$VERSION-$BUILD_NUMBER-$TAG.zip $BASE_FILES $EXTRA_FILES
            else
              tar zcf $WORK/$PNAME-$VERSION-$BUILD_NUMBER-$TAG.tar.gz $BASE_FILES $EXTRA_FILES
            fi
          done
          ls -lrt $WORK/$PNAME-$VERSION-*.*

      - name: Upload ${{ matrix.product }} as github artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.product }}-${{ github.run_id }}
          path: ${{ env.WORK }}/**/*.tar.gz
          retention-days: 1
          if-no-files-found: error
          include-hidden-files: true