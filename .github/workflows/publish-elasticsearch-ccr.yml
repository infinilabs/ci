name: Publish Elasticsearch CCR Plugin

defaults:
  run:
    shell: bash

env:
  PNAME: ccr
  TZ: Asia/Shanghai
  RELEASE_URL: ${{ vars.RELEASE_URL }}
  JAVA_DISTRIBUTION: ${{ vars.JAVA_DISTRIBUTION }}
  JAVA_VERSION: ${{ vars.JAVA_VERSION }}
  GRADLE_VERSION: ${{ vars.GRADLE_VERSION }}
  SSH_GIT_REPO: ${{ secrets.SSH_GIT_REPO }}
  SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
  SSH_GITEA_PRIVATE_KEY: ${{ secrets.SSH_GITEA_PRIVATE_KEY }}
  SSH_CONFIG: ${{ secrets.SSH_CONFIG }}
  OSS_EP: ${{ secrets.OSS_EP }}
  OSS_AK: ${{ secrets.OSS_AK }}
  OSS_SK: ${{ secrets.OSS_SK }}
  OSS_BK: ${{ secrets.OSS_BK }}
  OSS_MODE: ${{ secrets.OSS_MODE }}
  LOCAL_HOST: ${{ secrets.LOCAL_HOST }}
  LOCAL_PORT: ${{ secrets.LOCAL_PORT }}
  CONNECT_SERVER: ${{ secrets.CONNECT_SERVER }}
  CONNECT_PORT: ${{ secrets.CONNECT_PORT }}
  CONNECT_KEY: ${{ secrets.CONNECT_KEY }}
  CONNECT_TIMEOUT: ${{ vars.CONNECT_TIMEOUT }}
  CONNECT_MODE: ${{ vars.CONNECT_MODE }}
  CONNECT_METHOD: ${{ secrets.CONNECT_METHOD }}

on:
  workflow_dispatch:
    inputs:
      PUBLISH_VERSION:
        description: "Publish Version"
        required: true
        type: choice
        options:
          - "7.10.0"
          - "7.10.2"
          - "7.16.2"
          - "7.17.27"
        default: "7.10.0"
      PUBLISH_BRANCH:
        description: "Publish Branch"
        required: true
        type: choice
        options:
          - "dev_710"
          - "dev_7102"
          - "dev_7162"
          - "dev_71727_gf"
        default: "dev_710"

jobs:
  publish:
    name: Publish easysearch files with branch ${{ inputs.PUBLISH_BRANCH }}
    runs-on: ubuntu-latest
    env:
        VERSION: ${{inputs.PUBLISH_VERSION}}
        BRANCH: ${{inputs.PUBLISH_BRANCH}}
        BUILD_NUMBER: ${{ github.run_number }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup bootstrap
        uses: ./containers/bootstrap

      - name: Set up and check env
        run: |
            echo "Build ccr plugin with version $VERSION on branch $BRANCH"

      - name: Run connect in background
        run: |
          connect -c "$GITHUB_WORKSPACE/.net.json" >/dev/null 2>&1 &
          echo "Connect started with pid $!"
          sleep 5

      - name: Set up java toolchain
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up gradle
        run: |
          if [[ ! -d "$HOME/gradle-$GRADLE_VERSION" ]]; then
            wget https://services.gradle.org/distributions/gradle-$GRADLE_VERSION-bin.zip -P $HOME
            cd $HOME && unzip -q gradle-$GRADLE_VERSION-bin.zip && rm -rf gradle-$GRADLE_VERSION-bin.zip
          fi
          echo "PATH=$HOME/gradle-$GRADLE_VERSION/bin:$PATH" >> $GITHUB_ENV
          echo Gradle path is $HOME/gradle-$GRADLE_VERSION

      - name: Checkout ${{ env.PNAME }} repo
        run: |
          git clone --depth 1 --branch "$BRANCH" $SSH_GIT_REPO/$PNAME $GITHUB_WORKSPACE/$PNAME
          cd $GITHUB_WORKSPACE/$PNAME && echo Checkout $PNAME repo $(git log -1 --pretty=format:"%h, %ad" --date=iso)

      - name: Cache Gradle packages and jdks
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            /root/.gradle/caches
            ${{ github.workspace }}/jdks
          key: java-toolchian-${{ runner.os }}-gradle-${{ env.JAVA_DISTRIBUTION }}-${{ env.JAVA_VERSION }}

      - name: Build Plugin ${{env.PNAME}}
        run: |
          cd $GITHUB_WORKSPACE/$PNAME
          gradle clean assemble -x test -x javadoc
          
          # Check the build zip file
          echo "Built plugin zip files ..."
          find $GITHUB_WORKSPACE/$PNAME -name "*-$VERSION*.zip" -exec basename {} \;

      - name: Upload Plugin to OSS
        run: |
          set -euo pipefail

          readonly OSS_CONF="$GITHUB_WORKSPACE/.oss.yml"
          readonly OSS_KEY=".plugins/$PNAME"
          readonly TARGET_DIR="$GITHUB_WORKSPACE/$PNAME"

          oss_upload() {
            oss upload -c "$OSS_CONF" -o -k "$OSS_KEY" -f "$1"
          }

          while IFS= read -r -d '' zip_file; do
            zip_dir="$(dirname "$zip_file")"
            publish_name="$(basename "$zip_file" .zip)-${BUILD_NUMBER}.zip"
            publish_zip="$zip_dir/$publish_name"

            cp "$zip_file" "$publish_zip"
            (cd "$zip_dir" && sha512sum "$publish_name" > "$publish_name.sha512")

            echo "Uploading $publish_name ..."
            oss_upload "$publish_zip" && oss_upload "$publish_zip.sha512" && rm -rf "$publish_zip" "$publish_zip.sha512"
          done < <(find "$TARGET_DIR" -maxdepth 3 -name "*.zip" -print0)

  refresh_on_success:
    runs-on: ubuntu-latest
    needs: [publish]
    if: success()
    steps:          
      - name: Checkout code
        uses: actions/checkout@v7
      
      - name: Refresh download page on success
        env:
          RELEASE_IPS: ${{ vars.RELEASE_IPS }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            SCRIPT="${GITHUB_WORKSPACE}/scripts/purge-cache.sh"
            if [[ ! -f "$SCRIPT" ]]; then
              echo "::error::❌ Script not found: $SCRIPT"
              exit 0
            fi
            echo "Refresh download page on ci success"
            "$SCRIPT" "$RELEASE_URL/.plugins/${{ env.PNAME }}/"
          fi
