# PyPI Trusted Publisher settings:
#   - Owner:     infinilabs
#   - Repo:      ci
#   - Workflow:  publish-easysearch-py.yml
#   - Env:       

name: Publish easysearch-py to PyPI

on:
  # Triggered by easysearch-py when a v* tag is pushed
  repository_dispatch:
    types:
      - easysearch-py-release

  # Also supports manual dispatch from the ci repo
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: Build distribution packages
    runs-on: ubuntu-latest

    outputs:
      tag: ${{ steps.vars.outputs.tag }}

    steps:
      - name: Resolve tag
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            TAG="${{ github.event.client_payload.tag }}"
          else
            TAG="${{ github.event.inputs.tag }}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Publishing tag: ${TAG}"

      - name: Checkout easysearch-py at tag
        uses: actions/checkout@v6
        with:
          repository: infinilabs/easysearch-py
          ref: ${{ steps.vars.outputs.tag }}

      - name: Sync version from tag into _version.py
        run: |
          VERSION="${{ steps.vars.outputs.tag }}"
          VERSION="${VERSION#v}"
          sed -i "s/__versionstr__ = \"[^\"]*\"/__versionstr__ = \"${VERSION}\"/" easysearch/_version.py
          echo "Version set to: ${VERSION}"
          grep __versionstr__ easysearch/_version.py
        
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build wheel and sdist
        run: python -m build

      - name: Verify distribution with twine
        run: twine check --strict dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ steps.vars.outputs.tag }}
          path: dist/
          retention-days: 7

  publish:
    name: Publish to PyPI via OIDC
    needs: build
    runs-on: ubuntu-latest

    permissions:
      id-token: write

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ needs.build.outputs.tag }}
          path: dist/

      - name: List artifacts
        run: ls -lh dist/

      - name: Publish to PyPI (OIDC, no token required)
        uses: pypa/gh-action-pypi-publish@release/v1

  tag:
    name: Tag release in easysearch-py
    needs: [build, publish]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout and create tag in easysearch-py
        env:
          REPO_PAT: ${{ secrets.REPO_PAT }}
          TAG: ${{ needs.build.outputs.tag }}
        run: |
          echo "Ensuring tag ${TAG} exists in infinilabs/easysearch-py"
          git clone https://x-access-token:${REPO_PAT}@github.com/infinilabs/easysearch-py.git
          cd easysearch-py
          git config user.name github-actions
          git config user.email github-actions@github.com
          if git rev-parse --verify "refs/tags/${TAG}" 2>/dev/null; then
            echo "Tag ${TAG} already exists, skipping."
          else
            git tag -a ${TAG} -m "Release ${TAG}"
            git push origin ${TAG}
            echo "Tag ${TAG} created successfully."
          fi