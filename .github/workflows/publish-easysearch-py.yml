# PyPI Trusted Publisher settings:
#   - Owner:     infinilabs
#   - Repo:      ci
#   - Workflow:  publish-easysearch-py.yml
#   - Env:       

name: Publish product to PyPI

env:
  PNAME: easysearch-py

on:
  # Triggered by easysearch-py when a v* tag is pushed
  repository_dispatch:
    types:
      - easysearch-py-release

  # Also supports manual dispatch from the ci repo
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.1.0)"
        required: true
        type: string
        default: "v0.1.0"

permissions:
  contents: read
  id-token: write

jobs:
  tag:
    name: Commit version and tag in $PNAME
    runs-on: ubuntu-latest

    outputs:
      tag: ${{ steps.vars.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Setup bootstrap
        uses: ./containers/bootstrap
      - name: Resolve tag
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            TAG="${{ github.event.client_payload.tag }}"
          else
            TAG="${{ github.event.inputs.tag }}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Publishing tag: ${TAG}"

      - name: Commit version and create tag in $PNAME
        env:
          TAG: ${{ steps.vars.outputs.tag }}
        run: |
          TAG_VERSION="${TAG#v}"
          echo "Tagging ${TAG} (version ${TAG_VERSION}) in $PNAME"
          git clone ${{ secrets.SSH_GITHUB_REPO }}/$PNAME $GITHUB_WORKSPACE/$PNAME
          cd $GITHUB_WORKSPACE/$PNAME
          git config user.name github-actions && git config user.email github-actions@github.com
          if git rev-parse --verify "refs/tags/${TAG}" 2>/dev/null; then
            echo "Tag ${TAG} already exists, skipping."
          else
            sed -i "s/__versionstr__ = \"[^\"]*\"/__versionstr__ = \"${TAG_VERSION}\"/" easysearch/_version.py
            git add easysearch/_version.py
            git commit -m "bumpver: release ${TAG}"
            git tag -a ${TAG} -m "Release ${TAG}"
            git push origin HEAD
            git push origin ${TAG}
            echo "Tag ${TAG} created successfully."
          fi

  build:
    name: Build distribution packages
    needs: tag
    runs-on: ubuntu-latest

    outputs:
      tag: ${{ needs.tag.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Setup bootstrap
        uses: ./containers/bootstrap

      - name: Checkout $PNAME at tag
        uses: actions/checkout@v7
        with:
          repository: infinilabs/$PNAME
          ssh-key: ${{ secrets.SSH_PRIVATE_KEY }}
          ref: ${{ needs.tag.outputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build wheel and sdist
        run: python -m build

      - name: Verify distribution with twine
        run: twine check --strict dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ needs.tag.outputs.tag }}
          path: dist/
          retention-days: 1
          if-no-files-found: error
          include-hidden-files: true

  publish:
    name: Publish to PyPI via OIDC
    needs: build
    runs-on: ubuntu-latest

    permissions:
      id-token: write

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist-${{ needs.build.outputs.tag }}
          path: dist/

      - name: List artifacts
        run: ls -lh dist/

      - name: Publish to PyPI (OIDC, no token required)
        uses: pypa/gh-action-pypi-publish@release/v1

  update-repo:
    name: Update version in CI repo
    needs: [tag, publish]
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Update release version in workflow files
        run: |
          TAG="${{ needs.tag.outputs.tag }}"
          cd $GITHUB_WORKSPACE/.github/workflows
          source $GITHUB_WORKSPACE/scripts/update_publish_version.sh
          update_yaml_version "publish-$PNAME.yml" "tag" "${TAG}"

      - name: Create bumpver pull request
        uses: peter-evans/create-pull-request@v8
        id: create-pr
        with:
          token: ${{ secrets.REPO_PR_PAT }}
          commit-message: "bumpver: publish $PNAME ${{ needs.tag.outputs.tag }}"
          branch: "release/publish-$PNAME-${{ github.run_id }}"
          title: "bumpver: publish $PNAME ${{ needs.tag.outputs.tag }}"
          body: "Automated version update for $PNAME ${{ needs.tag.outputs.tag }}"
          labels: "auto-merge, automated"
          delete-branch: true
          add-paths: |
            .github/workflows/publish-$PNAME.yml

      - name: Auto-merge the pr
        if: ${{ steps.create-pr.outputs.pull-request-url }}
        env:
          PR_URL: ${{ steps.create-pr.outputs.pull-request-url }}
          GH_TOKEN: ${{ secrets.REPO_PAT }}
        run: gh pr merge "$PR_URL" --squash