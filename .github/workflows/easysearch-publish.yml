name: Publish Easysearch Files & Docker

defaults:
  run:
    shell: bash

env:
  DNAME: agent
  PNAME: easysearch
  TZ: Asia/Shanghai
  TOKEN: ${{ secrets.X_TOKEN }}
  PRE_RELEASE: ${{ vars.PRE_RELEASE }}
  RELEASE_URL: ${{ vars.RELEASE_URL }}
  PUBLISH_RELEASE: ${{ vars.PUBLISH_RELEASE }}
  JAVA_DISTRIBUTION: ${{ vars.JAVA_DISTRIBUTION }}
  JAVA_VERSION: ${{ vars.JAVA_VERSION }}
  GRADLE_VERSION: ${{ vars.GRADLE_VERSION }}
  SSH_GIT_REPO: ${{ secrets.SSH_GIT_REPO }}
  SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
  SSH_CONFIG: ${{ secrets.SSH_CONFIG }}
  OSS_EP: ${{ secrets.OSS_EP }}
  OSS_AK: ${{ secrets.OSS_AK }}
  OSS_SK: ${{ secrets.OSS_SK }}
  OSS_BK: ${{ secrets.OSS_BK }}
  OSS_MODE: ${{ secrets.OSS_MODE }}
  LOCAL_HOST: ${{ secrets.LOCAL_HOST }}
  LOCAL_PORT: ${{ secrets.LOCAL_PORT }}
  CONNECT_SERVER: ${{ secrets.CONNECT_SERVER }}
  CONNECT_PORT: ${{ secrets.CONNECT_PORT }}
  CONNECT_KEY: ${{ secrets.CONNECT_KEY }}
  CONNECT_TIMEOUT: ${{ vars.CONNECT_TIMEOUT }}
  CONNECT_MODE: ${{ vars.CONNECT_MODE }}
  CONNECT_METHOD: ${{ secrets.CONNECT_METHOD }}
  PROXY_RELEASE_INFINILABS: ${{ vars.PROXY_RELEASE_INFINILABS }}
  PUBLISH_VERSION: ${{ inputs.PUBLISH_VERSION || vars.EASYSEARCH_PUBLISH_VERSION }}
  AGENT_VERSION: ${{ inputs.PUBLISH_AGENT_VERSION || vars.PUBLISH_VERSION }}
  ZULU_JAVA_VERSION: ${{ vars.ZULU_JAVA_VERSION }}
  JAVA_VERSION_21: ${{ vars.JAVA_VERSION_21 }}
  NODEJS_VERSION: ${{ vars.NODEJS_EXT_VERSION }}
  NODE_OPTIONS: "--max-old-space-size=8192"
  GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=1g -Dorg.gradle.daemon=false"

on:
  push:
    tags:
      - "release*"
  schedule:
    - cron: "30 16 * * *"
  workflow_dispatch:
    inputs:
      PUBLISH_VERSION:
        description: "Publish Version"
        required: false
        default: "2.1.2"
      PUBLISH_AGENT_VERSION:
        description: "Publish With Agent Version"
        required: false
        default: "1.31.0-2015"
      PUBLISH_RELEASE:
        description: "Publish Release"
        required: false
        type: boolean
        default: false
      ONLY_DOCKER:
        description: "Publish Docker <Only>"
        required: false
        type: boolean
        default: false

jobs:
  publish:
    name: Publish easysearch files and docker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup bootstrap
        uses: ./containers/bootstrap

      - name: Run connect in background
        run: |
          connect -c "$GITHUB_WORKSPACE/.net.json" >/dev/null 2>&1 &
          echo "Connect started with pid $!"
          sleep 5

      - name: Set up and check env
        run: |
          mkdir -p $GITHUB_WORKSPACE/{dest,jdks}
          if [[ "${{ env.AGENT_VERSION }}" =~ ^([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            AGENT_VERSION=$(curl $RELEASE_URL/.latest |jq -r ".${DNAME}")
          fi
          echo "AGENT_VERSION=$AGENT_VERSION" >> $GITHUB_ENV

          # Set GRADLE version and BRANCH based on PUBLISH_VERSION
          BRANCH="1.x"
          if [[ "$PUBLISH_VERSION" == 2.* ]]; then
            BRANCH="main"
            GRADLE_VERSION=${{ vars.GRADLE_VERSION_8 }}
            JAVA_VERSION=${{ vars.JAVA_VERSION_21 }}
          fi
          echo "JAVA_VERSION=$JAVA_VERSION → using gradle version: $GRADLE_VERSION for branch: $BRANCH"
          echo "JAVA_VERSION=$JAVA_VERSION" >> $GITHUB_ENV
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV
          echo "GRADLE_VERSION=$GRADLE_VERSION" >> $GITHUB_ENV

      - name: Set up java toolchain
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up gradle
        run: |
          if [[ ! -d "$HOME/gradle-$GRADLE_VERSION" ]]; then
            wget https://services.gradle.org/distributions/gradle-$GRADLE_VERSION-bin.zip -P $HOME
            cd $HOME && unzip -q gradle-$GRADLE_VERSION-bin.zip && rm -rf gradle-$GRADLE_VERSION-bin.zip
          fi
          echo "PATH=$HOME/gradle-$GRADLE_VERSION/bin:$PATH" >> $GITHUB_ENV
          echo Gradle path is $HOME/gradle-$GRADLE_VERSION

      - name: Checkout ${{ env.PNAME }} repo
        run: |
          git clone --depth 1 --branch "$BRANCH" $SSH_GIT_REPO/$PNAME $GITHUB_WORKSPACE/$PNAME
          # show commit id and log
          cd $GITHUB_WORKSPACE/$PNAME && echo Checkout $PNAME repo $(git log -1 --pretty=format:"%h, %ad" --date=iso)

      - name: Setup ${{ env.PNAME }} build version and number
        run: |
          # check git log
          cd $GITHUB_WORKSPACE/$PNAME && echo Checkout $PNAME repo $(git log -1 --pretty=format:"%h, %ad" --date=iso)
          # setting env PUBLISH_VERSION
          if [[ "${{ inputs.PUBLISH_RELEASE}}" != "true" ]]; then
            if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
              PUBLISH_VERSION=${{ vars.EASYSEARCH_PUBLISH_VERSION }}
            fi
            if [[ "${{ inputs.PUBLISH_VERSION }}" =~ ^([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
              PUBLISH_VERSION="${BASH_REMATCH[1]}"
            fi
            echo PUBLISH_VERSION=$PUBLISH_VERSION >> $GITHUB_ENV
          fi
          # setting build version and number
          PUBLISH_RELEASE="${{ inputs.PUBLISH_RELEASE || vars.PUBLISH_RELEASE || 'FALSE' }}"
          if [[ "$(echo "$PUBLISH_VERSION" | grep -o '-' | wc -l)" -eq 1 ]]; then
            if [[ "$(echo "$PUBLISH_RELEASE" | tr '[:upper:]' '[:lower:]')" == "true" ]]; then
              IFS=- read -r DYNAMIC_VERSION DYNAMIC_BUILD_NUMBER <<< "$PUBLISH_VERSION"
            else
              DYNAMIC_BUILD_NUMBER="$(date +%Y%m%d)-SNAPSHOT"
              if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
                DYNAMIC_VERSION=$PUBLISH_VERSION
                RUN_NUMBER=${{ github.run_number }}
                OFFSET=${{ vars.OFFSET }}
                DYNAMIC_BUILD_NUMBER="$((RUN_NUMBER + OFFSET))-SNAPSHOT"
              fi
              DYNAMIC_VERSION=$(echo "$PUBLISH_VERSION" | awk -F. -v OFS=. '{ $2 = $2 + 1; $3 = 0; print $1, $2, $3}')
            fi
          else
            DYNAMIC_BUILD_NUMBER="$(date +%Y%m%d)-SNAPSHOT"
            DYNAMIC_VERSION=$(echo "$PUBLISH_VERSION" | awk -F. -v OFS=. '{ $2 = $2 + 1; $3 = 0; print $1, $2, $3}')
            if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
              DYNAMIC_VERSION=$PUBLISH_VERSION
              RUN_NUMBER=${{ github.run_number }}
              OFFSET=${{ vars.OFFSET }}
              if [[ "${{ inputs.PUBLISH_RELEASE}}" != "true" ]]; then
                DYNAMIC_BUILD_NUMBER="$((RUN_NUMBER + OFFSET))-SNAPSHOT"
              else
                DYNAMIC_BUILD_NUMBER="$((RUN_NUMBER + OFFSET))"
              fi
            fi
          fi

          DYNAMIC_BUILD_DATE=$(date '+%Y-%m-%d %H:%M:%S')
          echo VERSION=$DYNAMIC_VERSION >> $GITHUB_ENV
          echo BUILD_NUMBER=$DYNAMIC_BUILD_NUMBER >> $GITHUB_ENV
          echo BUILD_DATE=$DYNAMIC_BUILD_DATE >> $GITHUB_ENV
          echo FULL_VERSION=$DYNAMIC_VERSION-$DYNAMIC_BUILD_NUMBER >> $GITHUB_ENV
          cat $GITHUB_ENV

          echo "Build $PNAME with [ VERSION $VERSION | BUILD_NUMBER $BUILD_NUMBER ] at $BUILD_DATE"

      - name: Set up with pnpm toolchain
        uses: pnpm/action-setup@v5
        with:
          version: latest

      - name: Set up nodejs toolchain
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODEJS_VERSION }}

      - name: Check nodejs toolchain
        run: |
          if ! command -v pnpm >/dev/null 2>&1; then
            npm install -g pnpm
          fi
          node -v && npm -v && pnpm -v

      - name: Cache Gradle packages and jdks
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            /root/.gradle/caches
            ${{ github.workspace }}/jdks
          key: java-toolchian-${{ runner.os }}-gradle-${{ env.JAVA_DISTRIBUTION }}-${{ env.JAVA_VERSION }}

      - name: Prepare for build ${{ env.PNAME }} with ${{ env.PUBLISH_VERSION }}
        run: |
          # 
          if [[ "$BUILD_TYPE" == "schedule" ]]; then
            STEP_VERSION=$(echo "$PUBLISH_VERSION" | awk -F. -v OFS=. '{ $2 = $2 + 1; $3 = 0; print $1, $2, $3}')
          else
            STEP_VERSION="$PUBLISH_VERSION"
          fi
          echo STEP_VERSION=$STEP_VERSION >> $GITHUB_ENV

          PUBLISH_RELEASE="${{ inputs.PUBLISH_RELEASE || vars.PUBLISH_RELEASE || 'FALSE' }}"
          if [[ "$(echo "$PUBLISH_RELEASE" | tr '[:upper:]' '[:lower:]')" = "true" ]]; then
            $GITHUB_WORKSPACE/products/$PNAME/init-release.sh
            echo "Publish release version $STEP_VERSION with ${{ github.event_name }}"
          else
            export BUILD_TYPE="${{ github.event_name }}"
            export PUBLISHED_VERSION="$STEP_VERSION"
            $GITHUB_WORKSPACE/products/$PNAME/init-snapshot.sh
            echo "Publish snapshot version $STEP_VERSION with ${{ github.event_name }}"
          fi

      - name: Build linux with ${{ env.PUBLISH_VERSION }}
        run: |
          echo "Build $PNAME start..."          
          cd $GITHUB_WORKSPACE/$PNAME && gradle buildOssNoJdkLinuxTar

      - name: Build linux aarch with ${{ env.PUBLISH_VERSION }}
        run: |
          echo "Build $PNAME start..."          
          cd $GITHUB_WORKSPACE/$PNAME && gradle buildOssNoJdkLinuxAarch64Tar

      - name: Build Darwin aarch with ${{ env.PUBLISH_VERSION }}
        run: |
          echo "Build $PNAME start..."
          cd $GITHUB_WORKSPACE/$PNAME && gradle buildOssNoJdkDarwinAarch64Tar

      - name: Build Darwin with ${{ env.PUBLISH_VERSION }}
        run: |
          echo "Build $PNAME start..."          
          cd $GITHUB_WORKSPACE/$PNAME && gradle buildOssNoJdkDarwinTar

      - name: Build win with ${{ env.PUBLISH_VERSION }}
        run: |
          echo "Build $PNAME start..."          
          cd $GITHUB_WORKSPACE/$PNAME && gradle buildOssNoJdkWindowsZip

      - name: Build plugins with ${{ env.PUBLISH_VERSION }}
        run: |
          echo "Build $PNAME start..."          
          cd $GITHUB_WORKSPACE/$PNAME/plugins && gradle assemble -x test -x javadoc
          
          # Check the build zip file
          echo "Built plugin zip files ..."
          find $GITHUB_WORKSPACE/$PNAME/plugins -name "*-$VERSION*.zip" -exec basename {} \;

      - name: Repackage and bundle for publish with ${{ env.PUBLISH_VERSION }}
        run: |
          # build release or snapshot
          PUBLISH_RELEASE="${{ inputs.PUBLISH_RELEASE || vars.PUBLISH_RELEASE || 'FALSE' }}"
          if [[ "$(echo "$PUBLISH_RELEASE" | tr '[:upper:]' '[:lower:]')" == "true" ]]; then
            $GITHUB_WORKSPACE/products/$PNAME/build-release.sh
            $GITHUB_WORKSPACE/products/$PNAME/build-bundle.sh
          else
            $GITHUB_WORKSPACE/products/$PNAME/build-snapshot.sh
          fi

      - name: Upload snapshot versions artifact
        if: ${{ !(inputs.PUBLISH_RELEASE == true) }}
        uses: actions/upload-artifact@v7
        with:
          name: snapshot-versions
          path: ${{ github.workspace }}/products/easysearch/publish/.snapshot-versions.json
          retention-days: 1
          if-no-files-found: error
          include-hidden-files: true

      - name: Build for docker version ${{ env.VERSION }}-${{ env.BUILD_NUMBER }} with agent version ${{ env.AGENT_VERSION }}
        env:
          http_proxy: "http://${{ secrets.LOCAL_HOST }}:${{ secrets.LOCAL_PORT }}"
          https_proxy: "http://${{ secrets.LOCAL_HOST }}:${{ secrets.LOCAL_PORT }}"
          no_proxy: "localhost,127.0.1,::1"
        run: |
          echo "Build docker for $PNAME start..."
          #prepare docker build
          chmod 755 $GITHUB_WORKSPACE/products/$PNAME/build-docker.sh
          PUBLISH_RELEASE="${{ inputs.PUBLISH_RELEASE || vars.PUBLISH_RELEASE || 'FALSE' }}"
          if [[ "$(echo "$PUBLISH_RELEASE" | tr '[:upper:]' '[:lower:]')" == "true" ]]; then
            EZS_VER=$VERSION-$BUILD_NUMBER $GITHUB_WORKSPACE/products/$PNAME/build-docker.sh
          else
            EZS_TAG="$VERSION-$BUILD_NUMBER" $GITHUB_WORKSPACE/products/$PNAME/build-docker.sh
          fi

      - name: Set up qemu
        uses: docker/setup-qemu-action@v4

      - name: Set up docker buildx
        uses: docker/setup-buildx-action@v4
        #with:
        #  buildkitd-flags: --debug

      - name: Login to dockerhub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker build meta with ${{ env.PNAME }}
        id: tags
        run: |
          echo REPO_NAME=${{ vars.DOCKER_REPO }}/$PNAME >> $GITHUB_ENV
          if [[ "${{ inputs.PUBLISH_RELEASE }}" == "true" ]]; then
            echo "RELEASE_TAG=${{ vars.DOCKER_REPO }}/$PNAME:${{ env.VERSION }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Docker Build and push with anolisos ${{ env.VERSION }}-${{ github.run_number }}
        uses: docker/build-push-action@v7
        if: ${{ github.event_name == 'workflow_dispatch' || inputs.PUBLISH_RELEASE == true }}
        with:
          context: ${{ github.workspace }}/products/${{ env.PNAME }}
          file: ${{ github.workspace }}/products/${{ env.PNAME }}/Dockerfile.anolisos
          target: prod
          platforms: |
            linux/amd64
            linux/arm64
          tags: |
            ${{ env.REPO_NAME }}:${{ env.VERSION }}-${{ github.run_number }}
          push: true
          provenance: false

      - name: Docker Build and push with ${{ env.VERSION }}-${{ env.BUILD_NUMBER }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ github.workspace }}/products/${{ env.PNAME }}
          file: ${{ github.workspace }}/products/${{ env.PNAME }}/Dockerfile
          target: prod
          platforms: |
            linux/amd64
            linux/arm64
          tags: |
            ${{ env.REPO_NAME }}:${{ env.VERSION }}-${{ env.BUILD_NUMBER }}
            ${{ steps.tags.outputs.RELEASE_TAG }}
          push: true
          provenance: false
          #no-cache: true

      - name: Deploy easysearch to staging k8s(disabled for now)
        if: false
        timeout-minutes: 30
        continue-on-error: true
        run: |
          #Deploy docker
          echo "kubectl -n apollo set image statefulsets.apps/$PNAME $PNAME=$REPO_NAME:$VERSION-$BUILD_NUMBER" >> /tmp/update_image.sh
          echo "Deploy $PNAME to k8s staging at $(date +'%m-%d %H:%M:%S')"
          ssh staging 'bash -s' < /tmp/update_image.sh
          echo "Finished deploying $PNAME to staging at $(date +'%m-%d %H:%M:%S')"

  update_repo:
    runs-on: ubuntu-latest
    needs: publish
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.PUBLISH_RELEASE == true && inputs.ONLY_DOCKER == false && startsWith(inputs.PUBLISH_VERSION, '2.') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Prepare update version env
        run: |
          if [[ "$PUBLISH_VERSION" == *-* ]]; then
            IFS=- read -r DYNAMIC_VERSION DYNAMIC_BUILD_NUMBER <<< "$PUBLISH_VERSION"
          else
            RUN_NUMBER=${{ github.run_number }}
            OFFSET=${{ vars.OFFSET }}
            DYNAMIC_BUILD_NUMBER=$((RUN_NUMBER + OFFSET))
            DYNAMIC_VERSION="$PUBLISH_VERSION"
          fi
          echo "Update repo with $DYNAMIC_VERSION-$DYNAMIC_BUILD_NUMBER"
          echo VERSION=$DYNAMIC_VERSION >> $GITHUB_ENV
          echo BUILD_NUMBER=$DYNAMIC_BUILD_NUMBER >> $GITHUB_ENV

      - name: Update release version in workflow files
        id: update
        run: |
          cd $GITHUB_WORKSPACE/.github/workflows
          FULL_VERSION="${VERSION}-${BUILD_NUMBER}"
          source $GITHUB_WORKSPACE/scripts/update_publish_version.sh

          update_yaml_version "easysearch-publish.yml" "PUBLISH_VERSION" "$VERSION"
          update_yaml_version "publish-cloud.yml" "EZS_VERSION" "$VERSION"
          update_yaml_version "publish-coco.yml" "PUBLISH_EASYSEARCH_VERSION" "$FULL_VERSION"
          update_yaml_version "publish-coco-aisearch.yml" "PUBLISH_EASYSEARCH_VERSION" "$FULL_VERSION"
          update_yaml_version "release.yml" "PUBLISH_EZS_VERSION" "$FULL_VERSION"
          update_yaml_version "test-gateway.yml" "EZS_VERSION" "$VERSION"
          update_yaml_version "test-integration-products.yml" "EZS_VERSION" "$VERSION"
          update_yaml_version "test-intergration-easysearch.yml" "PUBLISH_VERSION" "$VERSION"
          update_yaml_version "test-integration-cocoserver.yml" "EZS_VERSION" "$FULL_VERSION"
          update_json_version "$GITHUB_WORKSPACE/ci/resources/easysearch-$VERSION-plugins.json" "version" "$FULL_VERSION"

      - name: Create bumpver pull request
        uses: peter-evans/create-pull-request@v8
        id: create-pr
        with:
          token: ${{ secrets.REPO_PAT }}
          commit-message: "bumpver: publish easysearch ${{ env.VERSION }}-${{ env.BUILD_NUMBER }}"
          branch: "release/publish-easysearch-${{ github.run_id }}"
          title: "bumpver: publish easysearch ${{ env.VERSION }}-${{ env.BUILD_NUMBER }}"
          body: "Automated publish easysearch ${{ env.VERSION }}-${{ env.BUILD_NUMBER }}"
          labels: "auto-merge, automated"
          delete-branch: true
          add-paths: |
            .github/workflows/*.yml
            resources/easysearch-*.json

      - name: Auto-merge the pr
        if: ${{ steps.create-pr.outputs.pull-request-url }}
        env:
          PR_URL: ${{ steps.create-pr.outputs.pull-request-url }}
          GH_TOKEN: ${{ secrets.REPO_PAT }}
        run: gh pr merge "$PR_URL" --squash

  update_snapshot_versions:
    runs-on: ubuntu-latest
    needs: publish
    if: ${{ success() && !(github.event_name == 'workflow_dispatch' && inputs.PUBLISH_RELEASE == true) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.REPO_PAT }}

      - name: Download snapshot versions artifact
        uses: actions/download-artifact@v8
        with:
          name: snapshot-versions
          path: products/easysearch/publish/

      - name: Create snapshot versions pull request
        uses: peter-evans/create-pull-request@v8
        id: create-pr
        with:
          token: ${{ secrets.REPO_PAT }}
          commit-message: "chore: update easysearch snapshot versions [skip ci]"
          branch: "snapshot/update-easysearch-versions-${{ github.run_id }}"
          title: "chore: update easysearch snapshot versions"
          body: "Automated update of easysearch snapshot versions after build ${{ github.run_id }}"
          labels: "auto-merge, automated"
          delete-branch: true
          add-paths: |
            products/easysearch/publish/.snapshot-versions.json

      - name: Auto-merge the pr
        if: ${{ steps.create-pr.outputs.pull-request-url }}
        env:
          PR_URL: ${{ steps.create-pr.outputs.pull-request-url }}
          GH_TOKEN: ${{ secrets.REPO_PAT }}
        run: gh pr merge "$PR_URL" --squash

  notify_on_failure:
    runs-on: ubuntu-latest
    needs: [publish]
    if: failure()
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Notify message via feishu
        env:
          FEISHU_BOT_URL: ${{ secrets.FEISHU_BOT_WEBHOOK_URL }}
          REPO_NAME: ${{ github.repository }}
          WORKFLOW_NAME: ${{ github.workflow }}
          RUN_ID: ${{ github.run_id }}
          ACTOR: ${{ github.triggering_actor }}
          SERVER_URL: ${{ github.server_url }}
        run: $GITHUB_WORKSPACE/scripts/feishu_message.sh

  refresh_on_success:
    runs-on: ubuntu-latest
    needs: [publish]
    if: success()
    steps:
      - name: Refresh download page on success
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "Refresh download page on ci success"
            sleep 5 && curl -o /dev/null -w "%{http_code}\n" -H 'x-reset-cache: true' "$RELEASE_URL/$PNAME/snapshot/"
            sleep 5 && curl -o /dev/null -w "%{http_code}\n" -H 'x-reset-cache: true' "$RELEASE_URL/$PNAME/snapshot/bundle/"
          fi
