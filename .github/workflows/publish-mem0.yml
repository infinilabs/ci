name: Publish OpenMemory MCP Docker Image

env:
    PNAME: mem0

on:
  workflow_dispatch:
    inputs:
      PUBLISH_TAG:
        description: 'Please enter the tag (e.g., 0.1.0)'
        required: true
        default: '0.1.0'
      BRANCH:
        description: 'Please enter the branch'
        required: true
        default: 'feat/easysearch'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Checkout ${{ env.PNAME }} code
        uses: actions/checkout@v6
        with: 
          repository: ${{ vars.GIT_REPO }}/${{ env.PNAME }}
          ref: ${{ github.event.inputs.BRANCH }}
          path: ${{ env.PNAME }}

      - name: Prepare build context
        run: |
          DOCKER_REPO="public/openmemory-mcp-easysearch"
          BUILD_TAG="${{ github.event.inputs.PUBLISH_TAG }}"
          BUILD_NUMBER=${{ github.run_number }}
          echo "DOCKER_REPO=$DOCKER_REPO" >> $GITHUB_ENV
          echo "BUILD_TAG=$BUILD_TAG" >> $GITHUB_ENV
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker registry
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.INFINI_DOCKER_REGISTRY }}
          username: ${{ secrets.INFINI_DOCKER_USERNAME }}
          password: ${{ secrets.INFINI_DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: ${{ github.workspace }}/products/${{ env.PNAME }}
          file: ${{ github.workspace }}/products/${{ env.PNAME }}/Dockerfile
          target: prod
          platforms: |
            linux/amd64
            linux/arm64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: 
            ${{ env.DOCKER_REPO }}:${{ env.BUILD_TAG }}
            ${{ env.DOCKER_REPO }}:${{ env.BUILD_TAG }}-${{ env.BUILD_NUMBER }}

  update-repo:
    name: Update version in CI repo
    needs: [build-and-push]
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Update release version in workflow files
        run: |
          TAG="${{ github.event.inputs.PUBLISH_TAG }}"
          cd $GITHUB_WORKSPACE/.github/workflows
          source $GITHUB_WORKSPACE/scripts/update_publish_version.sh
          update_yaml_version "publish-mem0.yml" "PUBLISH_TAG" "${TAG}"

      - name: Create bumpver pull request
        uses: peter-evans/create-pull-request@v8
        id: create-pr
        with:
          token: ${{ secrets.REPO_PAT }}
          commit-message: "bumpver: publish mem0 ${{ github.event.inputs.PUBLISH_TAG }}"
          branch: "release/publish-mem0-${{ github.run_id }}"
          title: "bumpver: publish mem0 ${{ github.event.inputs.PUBLISH_TAG }}"
          body: "Automated version update for mem0 ${{ github.event.inputs.PUBLISH_TAG }}"
          labels: "auto-merge, automated"
          delete-branch: true
          add-paths: |
            .github/workflows/publish-mem0.yml

      - name: Auto-merge the pr
        if: ${{ steps.create-pr.outputs.pull-request-url }}
        env:
          PR_URL: ${{ steps.create-pr.outputs.pull-request-url }}
          GH_TOKEN: ${{ secrets.REPO_PAT }}
        run: gh pr merge "$PR_URL" --squash