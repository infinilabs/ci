name: Security Dependency Scan for easysearch

defaults:
  run:
    shell: bash

env:
  PNAME: easysearch
  TZ: Asia/Shanghai
  SSH_GIT_REPO: ${{ secrets.SSH_GIT_REPO }}
  SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
  SSH_CONFIG: ${{ secrets.SSH_CONFIG }}
  LOCAL_HOST: ${{ secrets.LOCAL_HOST }}
  LOCAL_PORT: ${{ secrets.LOCAL_PORT }}
  CONNECT_SERVER: ${{ secrets.CONNECT_SERVER }}
  CONNECT_PORT: ${{ secrets.CONNECT_PORT }}
  CONNECT_KEY: ${{ secrets.CONNECT_KEY }}
  CONNECT_TIMEOUT: ${{ vars.CONNECT_TIMEOUT }}
  CONNECT_MODE: ${{ vars.CONNECT_MODE }}
  CONNECT_METHOD: ${{ secrets.CONNECT_METHOD }}
  JAVA_DISTRIBUTION: ${{ vars.JAVA_DISTRIBUTION }}
  JAVA_VERSION: ${{ vars.JAVA_VERSION }}
  GRADLE_VERSION: ${{ vars.GRADLE_VERSION }}
  ZULU_JAVA_VERSION: ${{ vars.ZULU_JAVA_VERSION }}
  JAVA_VERSION_21: ${{ vars.JAVA_VERSION_21 }}
  NODEJS_VERSION: ${{ vars.NODEJS_EXT_VERSION }}
  PNPM_VERSION: "latest"
  NODE_OPTIONS: "--max-old-space-size=8192"
  GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=1g -Dorg.gradle.daemon=false"

on:
  schedule:
    - cron: "10 19 * * *"  
  workflow_dispatch:
    inputs:
      BRANCH:
        description: "Branch to scan"
        required: false
        default: "main"
      FAIL_ON_CVSS:
        description: "Fail build if CVSS score >= (0-10, 0 = never fail)"
        required: false
        default: "7"

jobs:
  dependency-scan:
    name: Dependency Security Scan For Easysearch
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Product Repo
        uses: actions/checkout@v6

      - name: Setup bootstrap
        uses: ./containers/bootstrap

      - name: Run connect in background
        run: |
          connect -c "$GITHUB_WORKSPACE/.net.json" >/dev/null 2>&1 &
          echo "Connect started with pid $!"
          sleep 5          

      - name: Set up and check env
        env:
          PUBLISH_VERSION: 2.0.0
        run: |
          # Set GRADLE version and BRANCH based on PUBLISH_VERSION
          BRANCH="1.x"
          if [[ "$PUBLISH_VERSION" == 2.* ]]; then
            BRANCH="main"
            GRADLE_VERSION=${{ vars.GRADLE_VERSION_8 }}
            JAVA_VERSION=${{ vars.JAVA_VERSION_21 }}
          fi
          echo "JAVA_VERSION=$JAVA_VERSION → using gradle version: $GRADLE_VERSION for branch: $BRANCH"
          echo "JAVA_VERSION=$JAVA_VERSION" >> $GITHUB_ENV
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV
          echo "GRADLE_VERSION=$GRADLE_VERSION" >> $GITHUB_ENV

      - name: Checkout ${{ env.PNAME }} repo
        timeout-minutes: 30
        run: |
          git clone $SSH_GIT_REPO/$PNAME $GITHUB_WORKSPACE/$PNAME
          cd $GITHUB_WORKSPACE/$PNAME
          echo Checkout $PNAME repo $(git log -1 --pretty=format:"%h, %ad, %an, %s")

      - name: Set up java toolchain
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up gradle
        run: |
          if [[ ! -d "$HOME/gradle-$GRADLE_VERSION" ]]; then
            wget https://services.gradle.org/distributions/gradle-$GRADLE_VERSION-bin.zip -P $HOME
            cd $HOME && unzip -q gradle-$GRADLE_VERSION-bin.zip && rm -rf gradle-$GRADLE_VERSION-bin.zip
          fi
          echo "PATH=$HOME/gradle-$GRADLE_VERSION/bin:$PATH" >> $GITHUB_ENV
          echo Gradle path is $HOME/gradle-$GRADLE_VERSION

      - name: Set up with pnpm toolchain
        uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up nodejs toolchain
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODEJS_VERSION }}

      - name: Check nodejs toolchain
        run: |
          if ! command -v pnpm >/dev/null 2>&1; then
            npm install -g pnpm
          fi
          node -v && npm -v && pnpm -v
      - name: Cache Gradle packages and jdks
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            /root/.gradle/caches
            ${{ github.workspace }}/jdks
          key: java-toolchian-${{ runner.os }}-gradle-${{ env.JAVA_DISTRIBUTION }}-${{ env.JAVA_VERSION }}

      - name: Build linux
        run: |
          echo "Build $PNAME start..."          
          cd $GITHUB_WORKSPACE/$PNAME && gradle buildOssNoJdkLinuxTar

      - name: Install UI dependencies
        working-directory: easysearch/plugins/ui/web
        run: pnpm install --frozen-lockfile

      # ── OWASP DependencyCheck ──────────────────────────────────────────────

      - name: Get DependencyCheck version
        id: dc-version
        run: |
          VERSION=$(curl -s https://dependency-check.github.io/DependencyCheck/current.txt)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Cache DependencyCheck installation
        id: dc-cache
        uses: actions/cache@v5
        with:
          path: ${{ env.HOME }}/dependency-check
          key: dependency-check-install-${{ steps.dc-version.outputs.version }}

      - name: Install OWASP DependencyCheck
        if: steps.dc-cache.outputs.cache-hit != 'true'
        run: |
          curl -sL "https://github.com/dependency-check/DependencyCheck/releases/download/v${{ steps.dc-version.outputs.version }}/dependency-check-${{ steps.dc-version.outputs.version }}-release.zip" -o /tmp/dc.zip
          unzip -q /tmp/dc.zip -d $HOME

      - name: Get date for cache key
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Cache OWASP DependencyCheck database
        uses: actions/cache@v5
        with:
          path: ~/.dependency-check/data
          key: dependency-check-db-${{ runner.os }}-${{ steps.date.outputs.date }}
          restore-keys: |
            dependency-check-db-${{ runner.os }}-

      - name: Run OWASP DependencyCheck
        run: |
          $HOME/dependency-check/bin/dependency-check.sh \
            --project "$PNAME" \
            --scan "$GITHUB_WORKSPACE/$PNAME" \
            --format HTML \
            --enableRetired \
            --enableExperimental \
            --disableOssIndex \
            --nvdApiKey ${{ secrets.NVD_API_KEY }} \
            --nvdApiDelay 6000 \
            --suppression "$GITHUB_WORKSPACE/products/$PNAME/security/dependency-check-suppressions.xml" \
            --failOnCVSS ${{ inputs.FAIL_ON_CVSS || '7' }} \
            --out reports/
 
      - name: Upload OWASP report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: owasp-report-${{ github.run_number }}
          path: reports/
          retention-days: 7
 
      # ── Trivy ──────────────────────────────────────────────────────────────
 
      - name: Run Trivy (HTML report)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: "fs"
          scan-ref: "${{ github.workspace }}/${{ env.PNAME }}"
          format: "template"
          template: "@/contrib/html.tpl"
          output: "trivy-report.html"
          severity: "HIGH,CRITICAL"
          ignore-unfixed: true
 
      - name: Upload Trivy report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: trivy-report-${{ github.run_number }}
          path: trivy-report.html
          retention-days: 30
 
      - name: Run Trivy (table output for log)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: "fs"
          scan-ref: "${{ github.workspace }}/${{ env.PNAME }}"
          format: "table"
          severity: "HIGH,CRITICAL"
          ignore-unfixed: true