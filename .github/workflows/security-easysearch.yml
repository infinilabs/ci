name: Security Dependency Scan for easysearch

defaults:
  run:
    shell: bash

env:
  PNAME: easysearch
  TZ: Asia/Shanghai
  SSH_GIT_REPO: ${{ secrets.SSH_GIT_REPO }}
  SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
  SSH_CONFIG: ${{ secrets.SSH_CONFIG }}
  LOCAL_HOST: ${{ secrets.LOCAL_HOST }}
  LOCAL_PORT: ${{ secrets.LOCAL_PORT }}
  CONNECT_SERVER: ${{ secrets.CONNECT_SERVER }}
  CONNECT_PORT: ${{ secrets.CONNECT_PORT }}
  CONNECT_KEY: ${{ secrets.CONNECT_KEY }}
  CONNECT_TIMEOUT: ${{ vars.CONNECT_TIMEOUT }}
  CONNECT_MODE: ${{ vars.CONNECT_MODE }}
  CONNECT_METHOD: ${{ secrets.CONNECT_METHOD }}

on:
  schedule:
    - cron: "10 19 * * *"  
  workflow_dispatch:
    inputs:
      BRANCH:
        description: "Branch to scan"
        required: false
        default: "main"
      FAIL_ON_CVSS:
        description: "Fail build if CVSS score >= (0-10, 0 = never fail)"
        required: false
        default: "7"

jobs:
  dependency-scan:
    name: Dependency Security Scan For Easysearch
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Product Repo
        uses: actions/checkout@v6

      - name: Setup bootstrap
        uses: ./containers/bootstrap

      - name: Run connect in background
        run: |
          connect -c "$GITHUB_WORKSPACE/.net.json" >/dev/null 2>&1 &
          echo "Connect started with pid $!"
          sleep 5          

      - name: Checkout ${{ env.PNAME }} repo
        timeout-minutes: 30
        run: |
          git clone $SSH_GIT_REPO/$PNAME $GITHUB_WORKSPACE/$PNAME
          cd $GITHUB_WORKSPACE/$PNAME
          echo Checkout $PNAME repo $(git log -1 --pretty=format:"%h, %ad, %an, %s")

      # ── OWASP DependencyCheck ──────────────────────────────────────────────
 
      - name: Cache OWASP DependencyCheck database
        uses: actions/cache@v5
        with:
          path: ~/.dependency-check/data
          key: dependency-check-db-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            dependency-check-db-${{ runner.os }}-
 
      - name: Run OWASP DependencyCheck
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: ${{ env.PNAME }}
          path: ${{ github.workspace }}/${{ env.PNAME }}
          format: "HTML"
          args: >
            --enableRetired
            --enableExperimental
            --failOnCVSS ${{ inputs.FAIL_ON_CVSS || '7' }}
 
      - name: Upload OWASP report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: owasp-report-${{ github.run_number }}
          path: reports/
          retention-days: 30
 
      # ── Trivy ──────────────────────────────────────────────────────────────
 
      - name: Run Trivy (HTML report)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: "fs"
          scan-ref: "${{ github.workspace }}/${{ env.PNAME }}"
          format: "template"
          template: "@/contrib/html.tpl"
          output: "trivy-report.html"
          severity: "HIGH,CRITICAL"
          ignore-unfixed: true
 
      - name: Upload Trivy report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: trivy-report-${{ github.run_number }}
          path: trivy-report.html
          retention-days: 30
 
      - name: Run Trivy (table output for log)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: "fs"
          scan-ref: "${{ github.workspace }}/${{ env.PNAME }}"
          format: "table"
          severity: "HIGH,CRITICAL"
          ignore-unfixed: true