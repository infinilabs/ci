name: Security Dependency Scan for easysearch

defaults:
  run:
    shell: bash

env:
  PNAME: easysearch
  TZ: Asia/Shanghai
  SSH_GIT_REPO: ${{ secrets.SSH_GIT_REPO }}
  SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
  SSH_CONFIG: ${{ secrets.SSH_CONFIG }}
  LOCAL_HOST: ${{ secrets.LOCAL_HOST }}
  LOCAL_PORT: ${{ secrets.LOCAL_PORT }}
  CONNECT_SERVER: ${{ secrets.CONNECT_SERVER }}
  CONNECT_PORT: ${{ secrets.CONNECT_PORT }}
  CONNECT_KEY: ${{ secrets.CONNECT_KEY }}
  CONNECT_TIMEOUT: ${{ vars.CONNECT_TIMEOUT }}
  CONNECT_MODE: ${{ vars.CONNECT_MODE }}
  CONNECT_METHOD: ${{ secrets.CONNECT_METHOD }}
  JAVA_DISTRIBUTION: ${{ vars.JAVA_DISTRIBUTION }}
  JAVA_VERSION: ${{ vars.JAVA_VERSION }}
  GRADLE_VERSION: ${{ vars.GRADLE_VERSION }}
  ZULU_JAVA_VERSION: ${{ vars.ZULU_JAVA_VERSION }}
  JAVA_VERSION_21: ${{ vars.JAVA_VERSION_21 }}
  NODEJS_VERSION: ${{ vars.NODEJS_EXT_VERSION }}
  NODE_OPTIONS: "--max-old-space-size=8192"
  GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=1g -Dorg.gradle.daemon=false"

on:
  schedule:
    - cron: "10 19 * * *"  
  workflow_dispatch:
    inputs:
      BRANCH:
        description: "Branch to scan"
        required: false
        default: "main"
      FAIL_ON_CVSS:
        description: "Fail build if CVSS score >= (7 = High, 0 = disable fail)"
        required: false
        default: "7"

jobs:
  scan:
    name: Dependency Security Scan For Easysearch
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Product Repo (CI Scripts)
        uses: actions/checkout@v6

      - name: Setup bootstrap
        uses: ./containers/bootstrap

      - name: Run connect in background
        run: |
          connect -c "$GITHUB_WORKSPACE/.net.json" >/dev/null 2>&1 &
          echo "Connect started with pid $!"
          sleep 5          

      - name: Set up and check env
        run: |
          PUBLISH_VERSION="2.0.0" 
          BRANCH="1.x"
          GRADLE_V=${{ vars.GRADLE_VERSION }}
          JAVA_V=${{ vars.JAVA_VERSION }}
          
          if [[ "$PUBLISH_VERSION" == 2.* ]]; then
            BRANCH="main"
            GRADLE_V=${{ vars.GRADLE_VERSION_8 }}
            JAVA_V=${{ vars.JAVA_VERSION_21 }}
          fi
          echo "JAVA_VERSION=$JAVA_V" >> $GITHUB_ENV
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV
          echo "GRADLE_VERSION=$GRADLE_V" >> $GITHUB_ENV

      - name: Checkout ${{ env.PNAME }} code
        run: |
          git clone --depth 1 -b ${{ env.BRANCH }} ${{ secrets.SSH_GIT_REPO }}/${{ env.PNAME }} $GITHUB_WORKSPACE/${{ env.PNAME }}
          cd $GITHUB_WORKSPACE/${{ env.PNAME }}
          echo "Checked out $(git log -1 --pretty=format:'%h %s')"

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: ${{ vars.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Node.js & pnpm
        uses: pnpm/action-setup@v5
        with:
          version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ vars.NODEJS_EXT_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: '${{ env.PNAME }}/plugins/ui/web/pnpm-lock.yaml'

      - name: Install UI dependencies
        # 必须在扫描前执行 install，否则扫描器找不到 node_modules 会报警告
        working-directory: ${{ env.PNAME }}/plugins/ui/web
        run: pnpm install --no-frozen-lockfile

      - name: Build project (Optional but recommended)
        # 构建可以生成最终分发的 JAR，扫描生成的 JAR 更有意义
        run: |
          cd $GITHUB_WORKSPACE/${{ env.PNAME }}
          ./gradlew buildOssNoJdkLinux -x test

      - name: Create report directories
        run: mkdir -p reports/owasp reports/trivy

      # ── OWASP DependencyCheck ──────────────────────────────────────────────
      - name: Get DependencyCheck version
        id: dc-version
        run: echo "version=$(curl -s https://dependency-check.github.io/DependencyCheck/current.txt)" >> $GITHUB_OUTPUT

      - name: Cache DependencyCheck installation
        id: dc-cache
        uses: actions/cache@v5
        with:
          path: ${{ runner.tool_cache }}/dependency-check
          key: dc-install-${{ steps.dc-version.outputs.version }}

      - name: Install OWASP DependencyCheck
        if: steps.dc-cache.outputs.cache-hit != 'true'
        run: |
          VERSION=${{ steps.dc-version.outputs.version }}
          curl -sL "https://github.com/dependency-check/DependencyCheck/releases/download/v${VERSION}/dependency-check-${VERSION}-release.zip" -o /tmp/dc.zip
          unzip -q /tmp/dc.zip -d ${{ runner.tool_cache }}

      - name: Run OWASP DependencyCheck
        id: owasp
        continue-on-error: true
        env:
          DC_PATH: ${{ runner.tool_cache }}/dependency-check/bin/dependency-check.sh
        run: |
          $DC_PATH \
            --project "${{ env.PNAME }}" \
            --scan "$GITHUB_WORKSPACE/${{ env.PNAME }}" \
            --format HTML --format JSON \
            --nvdApiKey ${{ secrets.NVD_API_KEY }} \
            --failOnCVSS ${{ github.event.inputs.FAIL_ON_CVSS || '7' }} \
            --suppression "$GITHUB_WORKSPACE/${{ env.PNAME }}/security/suppressions.xml" \
            --exclude "**/plugins/analysis-hanlp/**/dictionary/**" \
            --out reports/owasp/

      # ── Trivy ──────────────────────────────────────────────────────────────
      - name: Run Trivy (HTML Report)
        id: trivy_html
        uses: aquasecurity/trivy-action@0.35.0
        continue-on-error: true
        with:
          scan-type: 'fs'
          scan-ref: '${{ github.workspace }}/${{ env.PNAME }}'
          format: 'template'
          template: '@/contrib/html.tpl'
          output: 'reports/trivy/trivy-report.html'
          severity: 'HIGH,CRITICAL'
          # 解决大文件扫描内存问题
          skip-dirs: "**/plugins/analysis-hanlp/**/dictionary"
          skip-files: "*.ngram.txt,*.info"
          ignore-unfixed: true

      - name: Run Trivy (Console Table)
        uses: aquasecurity/trivy-action@0.35.0
        continue-on-error: true
        with:
          scan-type: 'fs'
          scan-ref: '${{ github.workspace }}/${{ env.PNAME }}'
          format: 'table'
          severity: 'HIGH,CRITICAL'

      # ── Summary & Artifacts ──────────────────────────────────────────────
      - name: Upload Security Reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: security-reports-${{ github.run_id }}
          path: |
            reports/owasp/
            reports/trivy/
          retention-days: 14
          if-no-files-found: error
          include-hidden-files: true

      - name: Security Summary
        if: always()
        run: |
          # 定义图标映射逻辑
          get_icon() {
            if [ "$1" == "success" ]; then echo "✅ Pass"; else echo "⚠️ Issues Found (or Failed)"; fi
          }

          OWASP_RES=$(get_icon "${{ steps.owasp.outcome }}")
          TRIVY_RES=$(get_icon "${{ steps.trivy_html.outcome }}")

          echo "### 🔒 Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Tool | Status |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| **OWASP DependencyCheck** | $OWASP_RES |" >> $GITHUB_STEP_SUMMARY
          echo "| **Trivy (Vulnerability Scan)** | $TRIVY_RES |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Detailed reports are available in the **Artifacts** section." >> $GITHUB_STEP_SUMMARY

  notify_on_failure:
    runs-on: ubuntu-latest
    needs: [scan]
    if: failure()
    steps:
      - name: Notify Feishu
        run: $GITHUB_WORKSPACE/scripts/feishu_message.sh