name: Security Dependency Scan for easysearch

defaults:
  run:
    shell: bash

env:
  PNAME: easysearch
  TZ: Asia/Shanghai
  SSH_GIT_REPO: ${{ secrets.SSH_GIT_REPO }}
  SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
  SSH_CONFIG: ${{ secrets.SSH_CONFIG }}
  LOCAL_HOST: ${{ secrets.LOCAL_HOST }}
  LOCAL_PORT: ${{ secrets.LOCAL_PORT }}
  CONNECT_SERVER: ${{ secrets.CONNECT_SERVER }}
  CONNECT_PORT: ${{ secrets.CONNECT_PORT }}
  CONNECT_KEY: ${{ secrets.CONNECT_KEY }}
  CONNECT_TIMEOUT: ${{ vars.CONNECT_TIMEOUT }}
  CONNECT_MODE: ${{ vars.CONNECT_MODE }}
  CONNECT_METHOD: ${{ secrets.CONNECT_METHOD }}
  JAVA_DISTRIBUTION: ${{ vars.JAVA_DISTRIBUTION }}
  JAVA_VERSION: ${{ vars.JAVA_VERSION }}
  GRADLE_VERSION: ${{ vars.GRADLE_VERSION }}
  ZULU_JAVA_VERSION: ${{ vars.ZULU_JAVA_VERSION }}
  JAVA_VERSION_21: ${{ vars.JAVA_VERSION_21 }}
  NODEJS_VERSION: ${{ vars.NODEJS_EXT_VERSION }}
  NODE_OPTIONS: "--max-old-space-size=8192"
  GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=1g -Dorg.gradle.daemon=false"

on:
  schedule:
    - cron: "10 19 * * *"  
  workflow_dispatch:
    inputs:
      BRANCH:
        description: "Branch to scan"
        required: true
        type: choice
        options:
          - main
          - 1.x
        default: "main"
      FAIL_ON_CVSS:
        description: "Fail build if CVSS score >= (7 = High, 0 = disable fail)"
        required: false
        default: "7"

jobs:
  scan:
    name: Dependency Security Scan For Easysearch
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Product Repo (CI Scripts)
        uses: actions/checkout@v6

      - name: Setup bootstrap
        uses: ./containers/bootstrap

      - name: Run connect in background
        run: |
          connect -c "$GITHUB_WORKSPACE/.net.json" >/dev/null 2>&1 &
          echo "Connect started with pid $!"
          sleep 5          

      - name: Set up and check env
        run: |
          BRANCH="${{inputs.BRANCH}}"
          GRADLE_V=${{ vars.GRADLE_VERSION }}
          JAVA_V=${{ vars.JAVA_VERSION }}
          
          if [[ "$BRANCH" != "1.x" ]]; then
            BRANCH="main"
            GRADLE_V=${{ vars.GRADLE_VERSION_8 }}
            JAVA_V=${{ vars.JAVA_VERSION_21 }}
          fi

          echo "JAVA_VERSION=$JAVA_V" >> $GITHUB_ENV
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV
          echo "GRADLE_VERSION=$GRADLE_V" >> $GITHUB_ENV

      - name: Checkout ${{ env.PNAME }} code
        run: |
          git clone --depth 1 -b ${{ env.BRANCH }} ${{ secrets.SSH_GIT_REPO }}/${{ env.PNAME }} $GITHUB_WORKSPACE/${{ env.PNAME }}
          cd $GITHUB_WORKSPACE/${{ env.PNAME }}
          echo "Checked out $(git log -1 --pretty=format:'%h %s')"

      - name: Set up Java with ${{ vars.JAVA_DISTRIBUTION }}@${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          distribution: ${{ vars.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up gradle with  ${{ env.GRADLE_VERSION }}
        run: |
          if [[ ! -d "$HOME/gradle-$GRADLE_VERSION" ]]; then
            wget https://services.gradle.org/distributions/gradle-$GRADLE_VERSION-bin.zip -P $HOME
            cd $HOME && unzip -q gradle-$GRADLE_VERSION-bin.zip && rm -rf gradle-$GRADLE_VERSION-bin.zip
          fi
          echo "PATH=$HOME/gradle-$GRADLE_VERSION/bin:$PATH" >> $GITHUB_ENV
          echo Gradle path is $HOME/gradle-$GRADLE_VERSION

      - name: Set up Node.js & pnpm
        uses: pnpm/action-setup@v6
        with:
          version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ vars.NODEJS_EXT_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: '${{ env.PNAME }}/plugins/ui/web/pnpm-lock.yaml'

      - name: Install UI dependencies
        # 必须在扫描前执行 install，否则扫描器找不到 node_modules 会报警告
        working-directory: ${{ env.PNAME }}/plugins/ui/web
        run: pnpm install --no-frozen-lockfile

      - name: Build project (Optional but recommended)
        # 构建可以生成最终分发的 JAR，扫描生成的 JAR 更有意义
        run: |
          cd $GITHUB_WORKSPACE/${{ env.PNAME }}
          if [[ "$BRANCH" != "1.x" ]]; then
            ./gradlew buildOssNoJdkLinux -x test -x javadoc
          else
            gradle buildOssNoJdkLinux -x test -x javadoc
          fi

      - name: Create report directories for prepare
        run: |
          mkdir -p reports/owasp/{backend,frontend} reports/trivy
          touch reports/{owasp,trivy}/.keep

      # ── OWASP DependencyCheck ──────────────────────────────────────────────
      - name: Get DependencyCheck version
        id: dc-version
        run: echo "version=$(curl -s https://dependency-check.github.io/DependencyCheck/current.txt)" >> $GITHUB_OUTPUT

      - name: Cache DependencyCheck installation
        id: dc-cache
        uses: actions/cache@v5
        with:
          path: ${{ runner.tool_cache }}/dependency-check
          key: dc-install-${{ steps.dc-version.outputs.version }}

      - name: Install OWASP DependencyCheck
        if: steps.dc-cache.outputs.cache-hit != 'true'
        run: |
          VERSION=${{ steps.dc-version.outputs.version }}
          curl -sL "https://github.com/dependency-check/DependencyCheck/releases/download/v${VERSION}/dependency-check-${VERSION}-release.zip" -o /tmp/dc.zip
          unzip -q /tmp/dc.zip -d ${{ runner.tool_cache }}

      # ── OWASP DependencyCheck (Backend) ───────────────────────────────────
      - name: Run OWASP DependencyCheck (Backend - Gradle)
        id: owasp_backend
        continue-on-error: true
        env:
          DC_PATH: ${{ runner.tool_cache }}/dependency-check/bin/dependency-check.sh
        run: |
          SUPPRESSION=""
          if [ -f "$GITHUB_WORKSPACE/${{ env.PNAME }}/security/suppressions.xml" ]; then
            SUPPRESSION="--suppression $GITHUB_WORKSPACE/${{ env.PNAME }}/security/suppressions.xml"
          fi

          $DC_PATH \
            --project "${{ env.PNAME }}-backend" \
            --scan "$GITHUB_WORKSPACE/${{ env.PNAME }}" \
            --scan "$HOME/.gradle/caches/modules-2/files-2.1" \
            --format HTML --format JSON \
            --nvdApiKey ${{ secrets.NVD_API_KEY }} \
            --failOnCVSS ${{ github.event.inputs.FAIL_ON_CVSS || '7' }} \
            $SUPPRESSION \
            --exclude "**/plugins/analysis-hanlp/**/dictionary/**" \
            --exclude "**/plugins/ui/**" \
            --out reports/owasp/backend/

      # ── OWASP DependencyCheck (Frontend) ──────────────────────────────────
      - name: Run OWASP DependencyCheck (Frontend - pnpm)
        id: owasp_frontend
        continue-on-error: true
        env:
          DC_PATH: ${{ runner.tool_cache }}/dependency-check/bin/dependency-check.sh
        run: |
          SUPPRESSION=""
          if [ -f "$GITHUB_WORKSPACE/${{ env.PNAME }}/security/suppressions.xml" ]; then
            SUPPRESSION="--suppression $GITHUB_WORKSPACE/${{ env.PNAME }}/security/suppressions.xml"
          fi

          $DC_PATH \
            --project "${{ env.PNAME }}-frontend" \
            --scan "$GITHUB_WORKSPACE/${{ env.PNAME }}/plugins/ui/web" \
            --format HTML --format JSON \
            --nvdApiKey ${{ secrets.NVD_API_KEY }} \
            --failOnCVSS ${{ github.event.inputs.FAIL_ON_CVSS || '7' }} \
            $SUPPRESSION \
            --exclude "**/packages/**" \
            --exclude "**/src/common/**" \
            --out reports/owasp/frontend/

      # ── Trivy ──────────────────────────────────────────────────────────────
      - name: Download Trivy HTML template
        run: |
          echo "Download the tpl for trivy"
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/html.tpl \
            -o ${{ github.workspace }}/reports/trivy/html.tpl

      - name: Run Trivy (Backend - HTML Report)
        id: trivy_backend_html
        uses: aquasecurity/trivy-action@v0.36.0
        continue-on-error: true
        with:
          scan-type: 'fs'
          scan-ref: '${{ github.workspace }}/${{ env.PNAME }}'
          format: 'template'
          template: '@${{ github.workspace }}/reports/trivy/html.tpl'
          output: 'reports/trivy/trivy-backend-report.html'
          severity: 'HIGH,CRITICAL'
          skip-dirs: "**/plugins/analysis-hanlp/**/dictionary,**/plugins/ui"
          skip-files: "*.ngram.txt,*.info"
          ignore-unfixed: true

      - name: Run Trivy (Backend - Console Table)
        uses: aquasecurity/trivy-action@v0.36.0
        continue-on-error: true
        with:
          scan-type: 'fs'
          scan-ref: '${{ github.workspace }}/${{ env.PNAME }}'
          format: 'table'
          severity: 'HIGH,CRITICAL'
          skip-dirs: "**/plugins/analysis-hanlp/**/dictionary,**/plugins/ui"
          skip-files: "*.ngram.txt,*.info"
          ignore-unfixed: true

      - name: Run Trivy (Frontend - HTML Report)
        id: trivy_frontend_html
        uses: aquasecurity/trivy-action@v0.36.0
        continue-on-error: true
        with:
          scan-type: 'fs'
          scan-ref: '${{ github.workspace }}/${{ env.PNAME }}/plugins/ui/web'
          format: 'template'
          template: '@${{ github.workspace }}/reports/trivy/html.tpl'
          output: 'reports/trivy/trivy-frontend-report.html'
          severity: 'HIGH,CRITICAL'
          ignore-unfixed: true

      - name: Run Trivy (Frontend - Console Table)
        uses: aquasecurity/trivy-action@v0.36.0
        continue-on-error: true
        with:
          scan-type: 'fs'
          scan-ref: '${{ github.workspace }}/${{ env.PNAME }}/plugins/ui/web'
          format: 'table'
          severity: 'HIGH,CRITICAL'
          ignore-unfixed: true

      # ── Summary & Artifacts ──────────────────────────────────────────────
      - name: Upload Security Reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: security-reports-${{ github.run_id }}
          path: |
            reports/owasp/
            reports/trivy/
          retention-days: 14
          if-no-files-found: error
          include-hidden-files: true

      - name: Security Summary
        if: always()
        run: |
          get_icon() {
            if [ "$1" == "success" ]; then echo "✅ Pass"; else echo "⚠️ Issues Found (or Failed)"; fi
          }

          OWASP_BE_RES=$(get_icon "${{ steps.owasp_backend.outcome }}")
          OWASP_FE_RES=$(get_icon "${{ steps.owasp_frontend.outcome }}")
          TRIVY_BE_RES=$(get_icon "${{ steps.trivy_backend_html.outcome }}")
          TRIVY_FE_RES=$(get_icon "${{ steps.trivy_frontend_html.outcome }}")

          echo "### 🔒 Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Tool | Scope | Status |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| **OWASP DependencyCheck** | Backend  | $OWASP_BE_RES |" >> $GITHUB_STEP_SUMMARY
          echo "| **OWASP DependencyCheck** | Frontend | $OWASP_FE_RES |" >> $GITHUB_STEP_SUMMARY
          echo "| **Trivy**                 | Backend  | $TRIVY_BE_RES |" >> $GITHUB_STEP_SUMMARY
          echo "| **Trivy**                 | Frontend | $TRIVY_FE_RES |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Detailed reports are available in the **Artifacts** section." >> $GITHUB_STEP_SUMMARY

  notify_on_failure:
    runs-on: ubuntu-latest
    needs: [scan]
    if: failure()
    steps:
      - name: Notify Feishu
        run: $GITHUB_WORKSPACE/scripts/feishu_message.sh