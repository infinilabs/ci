name: Publish Products Docker With Branch
defaults:
  run:
    shell: bash
env:
  TZ: Asia/Shanghai
  GO_VERSION: ${{ vars.GO_VERSION }}
  NODEJS_VERSION: ${{ vars.NODEJS_VERSION }}
  NODEJS_EXT_VERSION: ${{ vars.NODEJS_EXT_VERSION }}
  PRE_RELEASE: ${{ vars.PRE_RELEASE }}
  RELEASE_URL: ${{ vars.RELEASE_URL }}
  PUBLISH_VERSION: ${{ inputs.PUBLISH_VERSION || vars.PUBLISH_VERSION }}
  NODE_OPTIONS: "--max-old-space-size=8192"
  
on:
  push:
    tags:
      - 'release*'
  workflow_dispatch:
    inputs:
      AGENT_PUBLISH:
        description: 'Agent'
        required: false
        type: boolean
        default: false
      CONSOLE_PUBLISH:
        description: 'Console'
        required: false
        type: boolean
        default: true
      GATEWAY_PUBLISH:
        description: 'Gateway'
        required: false
        type: boolean
        default: false
      LOADGEN_PUBLISH:
        description: 'Loadgen'
        required: false
        type: boolean
        default: false
      PUBLISH_RELEASE:
        description: 'Publish Release'
        required: false
        type: boolean
        default: true
      ONLY_DOCKER:
        description: 'Publish Docker <Only>'
        required: false
        type: boolean
        default: true
      PUBLISH_VERSION:
        description: 'Publish Release Version'
        required: false
        default: "1.30.3"
      PUBLISH_BRANCH:
        description: 'Publish With Branch'
        required: false
        default: "main"

jobs:
  generate-matrix: 
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen-matrix.outputs.matrix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Generate matrix
        id: gen-matrix
        env:
            AGENT_PUBLISH: ${{ inputs.AGENT_PUBLISH }}
            CONSOLE_PUBLISH: ${{ inputs.CONSOLE_PUBLISH }}
            GATEWAY_PUBLISH: ${{ inputs.GATEWAY_PUBLISH }}
            LOADGEN_PUBLISH: ${{ inputs.LOADGEN_PUBLISH }}
        run: |
          matrix=$($GITHUB_WORKSPACE/scripts/go-matrix.sh)
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          cat "$GITHUB_OUTPUT"

  publish:
    needs: generate-matrix
    name: Publish ${{ matrix.product }}@${{inputs.PUBLISH_BRANCH}}
    runs-on: ubuntu-latest
    env:
        OSS_EP: ${{ secrets.OSS_EP }}
        OSS_AK: ${{ secrets.OSS_AK }}
        OSS_SK: ${{ secrets.OSS_SK }}
        OSS_BK: ${{ secrets.OSS_BK }}
        OSS_MODE: ${{ secrets.OSS_MODE }}
        LOCAL_HOST: ${{ secrets.LOCAL_HOST }}
        LOCAL_PORT: ${{ secrets.LOCAL_PORT }}
        SSH_GIT_REPO: ${{ secrets.SSH_GIT_REPO }}
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        SSH_CONFIG: ${{ secrets.SSH_CONFIG }}
        CONNECT_SERVER: ${{ secrets.CONNECT_SERVER }}
        CONNECT_PORT: ${{ secrets.CONNECT_PORT }}
        CONNECT_KEY: ${{ secrets.CONNECT_KEY }}
        CONNECT_TIMEOUT: ${{ vars.CONNECT_TIMEOUT }}
        CONNECT_MODE: ${{ vars.CONNECT_MODE }}
        CONNECT_METHOD: ${{ secrets.CONNECT_METHOD }}
        TARGETS: win-amd64 win-386 linux-amd64 linux-amd64-dev linux-386 linux-mips64 linux-mips64le linux-armv6 linux-armv7 linux-arm64 linux-loong64 linux-riscv64 darwin-amd64 darwin-arm64
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup bootstrap
        uses: ./containers/bootstrap

      - name: Checkout framework code
        uses: actions/checkout@v6
        with: 
          repository: ${{ vars.GIT_REPO }}/framework
          ref: main
          path: framework

      - name: Checkout framework vendor code
        uses: actions/checkout@v6
        with: 
          repository: ${{ vars.GIT_REPO }}/framework-vendor
          ref: main
          path: vendor

      - name: Checkout ${{ matrix.product }} code
        uses: actions/checkout@v6
        with: 
          repository: ${{ vars.GIT_REPO }}/${{ matrix.product }}
          ref: ${{ inputs.PUBLISH_BRANCH}}
          path: ${{ matrix.product }}

      - name: Setup ${{ matrix.product }} env
        run: |
          source $GITHUB_WORKSPACE/scripts/go-init.sh
          if [[ "$(echo "${{ vars.PRE_RELEASE }}" | tr '[:upper:]' '[:lower:]')" == "true" ]]; then
            grep -wq "pre" $GITHUB_WORKSPACE/.oss.yml || echo "pre: true" >> $GITHUB_WORKSPACE/.oss.yml
          fi
          echo WORK=$WORK >> $GITHUB_ENV
          echo WORKBASE=$WORKBASE >> $GITHUB_ENV
          echo PNAME=${{ matrix.product }} >> $GITHUB_ENV
          echo PATH=$PATH:$GITHUB_WORKSPACE/tools >> $GITHUB_ENV

      - name: Setup ${{ matrix.product }} go toolchain
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: false
          cache: true
          cache-dependency-path: "**/*.sum"

      - name: Check ${{ matrix.product }} go toolchain
        run: go version && go env

      - name: Set up Node.js for ${{ matrix.product }}
        if: matrix.product == 'agent' || matrix.product == 'console'
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.product == 'agent' && env.NODEJS_EXT_VERSION || env.NODEJS_VERSION }}
          cache: 'npm'
          cache-dependency-path: "**/package.json"

      - name: Setup pnpm (agent only)
        if: matrix.product == 'agent'
        uses: pnpm/action-setup@v6
        with:
          version: latest

      - name: Setup cnpm (console only)
        if: matrix.product == 'console'
        run: |
          npm install -g rimraf
          npm install -g cnpm@9.2.0

      - name: Verify toolchain for ${{ matrix.product }}
        if: matrix.product == 'agent' || matrix.product == 'console'
        run: |
          node -v && npm -v
          if [[ "${{ matrix.product }}" == "agent" ]]; then
            pnpm -v
          elif [[ "${{ matrix.product }}" == "console" ]]; then
            cnpm -v
          fi

      - name: Prepare ${{ matrix.product }} build code
        if: ${{ inputs.PUBLISH_VERSION !='' || vars.PUBLISH_VERSION !='' }}
        run: |
          cd $WORK/$PNAME
          echo "Build $PNAME at $PWD"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ inputs.PUBLISH_RELEASE}}" != "true" ]]; then
              PUBLISH_VERSION=${{ vars.PUBLISH_VERSION }}
            fi
          fi
          PUBLISH_RELEASE="${{ inputs.PUBLISH_RELEASE || vars.PUBLISH_RELEASE || 'FALSE' }}"
          if [[ "$(echo "$PUBLISH_RELEASE" | tr '[:upper:]' '[:lower:]')" == "true" ]]; then
            if [[ "$PUBLISH_VERSION" == *-* ]]; then
              IFS=- read -r DYNAMIC_VERSION DYNAMIC_BUILD_NUMBER <<< "$PUBLISH_VERSION"
            else
              RUN_NUMBER=${{ github.run_number }}
              OFFSET=${{ vars.OFFSET }}
              DYNAMIC_BUILD_NUMBER=$((RUN_NUMBER + OFFSET))
              DYNAMIC_VERSION="$PUBLISH_VERSION"
            fi
          else
            DYNAMIC_BUILD_NUMBER=$(date +%Y%m%d)
            DYNAMIC_VERSION=$(echo "$PUBLISH_VERSION" | awk -F. -v OFS=. '{ $2 = $2 + 1; $3 = 0; print $1, $2, $3 "_NIGHTLY" }')
            if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
              DYNAMIC_VERSION=$(echo "$PUBLISH_VERSION" | awk -F. -v OFS=. '{ $2 = $2 + 1; $3 = 0; print $1, $2, $3 "_SNAPSHOT" }')
              RUN_NUMBER=${{ github.run_number }}
              OFFSET=${{ vars.OFFSET }}
              DYNAMIC_BUILD_NUMBER=$((RUN_NUMBER + OFFSET))
            fi
          fi
          echo "Build $PNAME with $DYNAMIC_VERSION-$DYNAMIC_BUILD_NUMBER"

          echo VERSION=$DYNAMIC_VERSION >> $GITHUB_ENV
          echo BUILD_NUMBER=$DYNAMIC_BUILD_NUMBER >> $GITHUB_ENV
          echo EOL=$(date -u -d "1 year" +"%Y-12-31T10:10:10Z") >> $GITHUB_ENV
          echo BUILD_DATE=$(date '+%Y-%m-%d %H:%M:%S') >> $GITHUB_ENV

      - name: Run connect in background for ${{ matrix.product }} web
        run: |
          connect -c "$GITHUB_WORKSPACE/.net.json" >/dev/null 2>&1 &
          echo "Connect started with pid $!"
          sleep 5

      - name: Checkout depends repo code for ${{ matrix.product }} web
        if: ${{ matrix.product == 'agent' }}
        env:
          BRANCH: main
        run: |
          git clone --depth 1 --branch "$BRANCH" --sparse ${{ secrets.SSH_GIT_REPO }}/easysearch $GITHUB_WORKSPACE/easysearch
          (cd $GITHUB_WORKSPACE/easysearch && git sparse-checkout set plugins/ui)
          # init license and enterprise plugins
          git clone git@github.com:infinilabs/license $WORK/license
          git clone git@github.com:infinilabs/agent-enterprise-plugin.git $GITHUB_WORKSPACE/$PNAME/plugin/enterprise

      - name: Build ui for ${{ matrix.product }} web
        if: ${{ matrix.product == 'agent' }}
        run: |
          SRC=$GITHUB_WORKSPACE/easysearch/plugins/ui/web
          DEST=$GITHUB_WORKSPACE/easysearch/plugins/ui/_ui
          (cd $SRC && pnpm i && pnpm run build:agent )
          if [ -d $DEST ]; then
            mv $DEST $GITHUB_WORKSPACE/$PNAME/.public
          fi

      - name: Build ${{ matrix.product }} with ${{ env.VERSION }}-${{ env.BUILD_NUMBER }}
        run: |
          # for agent web
          if [[ "${{ matrix.product }}" == "agent" ]]; then
            cd $WORK/$PNAME && mkdir -p .public && make update-vfs
          fi
          # for console web
          if [[ "${{ matrix.product }}" == "console" ]]; then
            cd $WORK/$PNAME/web && cnpm install --quiet --no-progress && cnpm run build --quiet
          fi

          # build all targets
          for tag in $TARGETS; do
            cd $WORK/$PNAME && GOMODULE=false make build-$tag
          done

      - name: Build ${{ matrix.product }} check
        run: |
          ls -lrt $WORK/$PNAME/bin
          for tag in $TARGETS; do
            IFS='-' read -r p1 p2 <<< "$tag"
            TAG="$(echo $p1|sed 's/darwin/mac/;s/win/windows/')-$p2"
            [[ "$p1" == "win" ]] && TAG="$TAG.exe"
            [ -f "$WORK/$PNAME/bin/$PNAME-$TAG" ] || { echo "Build $PNAME failed with not found $PNAME-$TAG" && exit 1; }
          done

      - name: Build ${{ matrix.product }} License and notice process
        run: |
          cp -rf $WORK/$PNAME/config $WORK/$PNAME/bin
          find $WORK/$PNAME/bin -name "*.go" -delete
          if [[ "${{ matrix.product }}" == "console" ]]; then
            PERMJSON=$WORK/$PNAME/modules/security/realm/authc/native/permission.json
            if [[ -e $PERMJSON ]]; then
              cp -rf $PERMJSON $WORK/$PNAME/bin/config
            fi
          fi
          cp -rf $WORK/framework/LICENSE $WORK/$PNAME/bin && cat $WORK/framework/NOTICE $WORK/$PNAME/NOTICE > $WORK/$PNAME/bin/NOTICE
          ls -lrt $WORK/$PNAME/bin

      - name: Set up qemu with ${{ matrix.product }}
        uses: docker/setup-qemu-action@v4

      - name: Set up docker buildx with ${{ matrix.product }}
        uses: docker/setup-buildx-action@v4
        #with:
        #  buildkitd-flags: --debug

      - name: Login to dockerhub with ${{ matrix.product }}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker build meta with ${{ matrix.product }}
        id: tags
        run: |
          echo REPO_NAME=${{ vars.DOCKER_REPO }}/${{ matrix.product }} >> $GITHUB_ENV
          if [[ "${{ inputs.PUBLISH_RELEASE }}" == "true" ]]; then
            echo "RELEASE_TAG=${{ vars.DOCKER_REPO }}/${{ matrix.product }}:${{ env.VERSION }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Docker build and push for ${{ matrix.product }} with ${{ env.VERSION }}-${{ env.BUILD_NUMBER }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ github.workspace }}/${{ matrix.product }}/bin
          file: ${{ github.workspace }}/products/${{ matrix.product }}/Dockerfile
          target: prod
          platforms: |
            linux/386
            linux/arm/v6
            linux/arm/v7
            linux/amd64
            linux/arm64
            linux/riscv64
          tags: |
            ${{ env.REPO_NAME }}:${{ env.VERSION }}-${{ env.BUILD_NUMBER }}
            ${{ steps.tags.outputs.RELEASE_TAG }}
          push: true

      - name: Archive ${{ matrix.product }} files
        if: ${{ ! inputs.ONLY_DOCKER }}
        run: |
          cd $WORK/$PNAME/bin

          EXTRA_FILES=""
          if [[ "$PNAME" == "loadgen" ]]; then
            echo "Collecting .dsl files for loadgen examples..."
            mkdir -p examples
            find $WORK/$PNAME -type f -name "*.dsl" -exec cp {} examples/ \;
            if [ "$(ls -A examples)" ]; then
               EXTRA_FILES="examples"
            fi
          fi

          for tag in $TARGETS; do
            IFS='-' read -r p1 p2 <<< "$tag"
            TAG="$(echo $p1|sed 's/darwin/mac/;s/win/windows/')-$p2"
            EXT=$TAG
            [[ "$p1" == "win" ]] && EXT="$TAG.exe"

            echo "Archive $PNAME-$p1-$p2 with [ VERSION $VERSION | BUILD_NUMBER $BUILD_NUMBER ] at $BUILD_DATE"
            BASE_FILES="$PNAME-$EXT $PNAME.yml LICENSE NOTICE config"
            if [[ "$p1" == "win" ]] || [[ "$p1" == "darwin" ]]; then
              zip -qr $WORK/$PNAME-$VERSION-$BUILD_NUMBER-$TAG.zip $BASE_FILES $EXTRA_FILES
            else
              tar zcf $WORK/$PNAME-$VERSION-$BUILD_NUMBER-$TAG.tar.gz $BASE_FILES $EXTRA_FILES
            fi
          done
          ls -lrt $WORK/$PNAME-$VERSION-*.*
                      
      - name: Upload ${{ matrix.product }} files
        if: ${{ ! inputs.ONLY_DOCKER }}
        run: | 
          cd $WORK
          for tag in $TARGETS; do
            IFS='-' read -r p1 p2 <<< "$tag"
            TAG="$(echo $p1|sed 's/darwin/mac/;s/win/windows/')-$p2"
            echo "Upload $PNAME with $VERSION-$BUILD_NUMBER at $PWD"
            if [[ "$p1" == "win" ]] || [[ "$p1" == "darwin" ]]; then
                if [ -f $WORK/$PNAME-$VERSION-$BUILD_NUMBER-$TAG.zip ]; then
                    (cd $WORK && sha512sum $PNAME-$VERSION-$BUILD_NUMBER-$TAG.zip > $PNAME-$VERSION-$BUILD_NUMBER-$TAG.zip.sha512)
                    oss upload -c $GITHUB_WORKSPACE/.oss.yml -o -p $PNAME -f $WORK/$PNAME-$VERSION-$BUILD_NUMBER-$TAG.zip
                    oss upload -c $GITHUB_WORKSPACE/.oss.yml -o -p $PNAME -f $WORK/$PNAME-$VERSION-$BUILD_NUMBER-$TAG.zip.sha512
                fi
            else
                if [ -f $WORK/$PNAME-$VERSION-$BUILD_NUMBER-$TAG.tar.gz ]; then
                    (cd $WORK && sha512sum $PNAME-$VERSION-$BUILD_NUMBER-$TAG.tar.gz > $PNAME-$VERSION-$BUILD_NUMBER-$TAG.tar.gz.sha512)
                    oss upload -c $GITHUB_WORKSPACE/.oss.yml -o -p $PNAME -f $WORK/$PNAME-$VERSION-$BUILD_NUMBER-$TAG.tar.gz
                    oss upload -c $GITHUB_WORKSPACE/.oss.yml -o -p $PNAME -f $WORK/$PNAME-$VERSION-$BUILD_NUMBER-$TAG.tar.gz.sha512
                fi
            fi
          done

      - name: Run connect in background for ${{ matrix.product }}
        if: ${{ matrix.product == 'console' }}
        run: |
          connect -c "$GITHUB_WORKSPACE/.net.json" >/dev/null 2>&1 &
          echo "Connect started with pid $!"
          sleep 5

      - name: Deploy ${{ matrix.product }} files & staging k8s
        if: ${{ matrix.product == 'console' }}
        timeout-minutes: 30
        continue-on-error: true
        run: |
          if [[ -f $WORK/$PNAME/bin/$PNAME-linux-amd64 ]]; then
            echo "Deploying $PNAME to staging at $(date +'%m-%d %H:%M:%S')"
            rsync -avzP -e 'ssh -o Ciphers=aes128-gcm@openssh.com' $WORK/$PNAME/bin/$PNAME-linux-amd64 staging:/infini/demo-environment/console/update
            echo "Uploaded $PNAME to staging at $(date +'%m-%d %H:%M:%S')"
            ssh staging 'bash -s' < $GITHUB_WORKSPACE/products/$PNAME/deploy.sh
          else
            echo "No $PNAME binary found"
          fi
          #Deploy docker
          echo "kubectl -n apollo set image statefulsets.apps/$PNAME $PNAME=$REPO_NAME:$VERSION-$BUILD_NUMBER" >> /tmp/update_image.sh
          echo "Deploying $PNAME to staging k8s"
          ssh staging 'bash -s' < /tmp/update_image.sh
          echo "Finished deploying $PNAME to staging at $(date +'%m-%d %H:%M:%S')"

  update_repo:
    runs-on: ubuntu-latest
    needs: publish
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.PUBLISH_RELEASE == true }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Prepare update version env
        run: |
          if [[ "$PUBLISH_VERSION" == *-* ]]; then
            IFS=- read -r DYNAMIC_VERSION DYNAMIC_BUILD_NUMBER <<< "$PUBLISH_VERSION"
          else
            RUN_NUMBER=${{ github.run_number }}
            OFFSET=${{ vars.OFFSET }}
            DYNAMIC_BUILD_NUMBER=$((RUN_NUMBER + OFFSET))
            DYNAMIC_VERSION="$PUBLISH_VERSION"
          fi
          echo "Update repo with $DYNAMIC_VERSION-$DYNAMIC_BUILD_NUMBER"

          echo VERSION=$DYNAMIC_VERSION >> $GITHUB_ENV
          echo BUILD_NUMBER=$DYNAMIC_BUILD_NUMBER >> $GITHUB_ENV

      - name: Update release version in workflow files
        id: update
        run: |
          cd $GITHUB_WORKSPACE/.github/workflows
          FULL_VERSION="${VERSION}-${BUILD_NUMBER}"
          source $GITHUB_WORKSPACE/scripts/update_publish_version.sh

          update_yaml_version "publish-docker.yml"            "PUBLISH_VERSION"       "$VERSION"
          update_yaml_version "publish-files.yml"             "PUBLISH_VERSION"       "$VERSION"
          update_yaml_version "publish-console-branch.yml"    "PUBLISH_VERSION"       "$VERSION"
          
      - name: Create bumpver pull request
        uses: peter-evans/create-pull-request@v8
        id: create-pr
        with:
          token: ${{ secrets.REPO_PAT }}
          commit-message: "bumpver: publish console/agent/gateway/loadgen ${{ env.VERSION }}-${{ env.BUILD_NUMBER }}"
          branch: "release/publish-products-${{ github.run_id }}"
          title: "bumpver: publish console/agent/gateway/loadgen ${{ env.VERSION }}-${{ env.BUILD_NUMBER }}"
          body: "Automated publish console/agent/gateway/loadgen ${{ env.VERSION }}-${{ env.BUILD_NUMBER }}"
          labels: "auto-merge, automated"
          delete-branch: true
          add-paths: |
            .github/workflows/*.yml

      - name: Auto-merge the pr
        if: ${{ steps.create-pr.outputs.pull-request-url }}
        env:
          PR_URL: ${{ steps.create-pr.outputs.pull-request-url }}
          GH_TOKEN: ${{ secrets.REPO_PAT }}
        run: gh pr merge "$PR_URL" --squash

  notify_on_failure:
    runs-on: ubuntu-latest
    needs: [publish]
    if: failure()
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        
      - name: Notify message via feishu
        env:
          FEISHU_BOT_URL: ${{ secrets.FEISHU_BOT_WEBHOOK_URL }}
          REPO_NAME: ${{ github.repository }}
          WORKFLOW_NAME: ${{ github.workflow }}
          RUN_ID: ${{ github.run_id }}
          ACTOR: ${{ github.triggering_actor }}
          SERVER_URL: ${{ github.server_url }}
        run: $GITHUB_WORKSPACE/scripts/feishu_message.sh
        
  refresh_on_success:
    runs-on: ubuntu-latest
    needs: [generate-matrix, publish]
    if: success()
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    steps:
      - name: Refresh download page on success ${{ matrix.product }}
        env:
          RELEASE_IPS: ${{ vars.RELEASE_IPS }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "Refresh download page on ci success"
            $GITHUB_WORKSPACE/scripts/purge-cache.sh "$RELEASE_URL/${{ matrix.product }}/snapshot/"
          fi