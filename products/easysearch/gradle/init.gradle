// ─────────────────────────────────────────────────────────────────────────────
// init.gradle
// ─────────────────────────────────────────────────────────────────────────────

System.setProperty('http.connectionTimeout',  '15000')
System.setProperty('http.socketTimeout',      '15000')
System.setProperty('https.connectionTimeout', '15000')
System.setProperty('https.socketTimeout',     '15000')

def addOfficialRepos = { repos ->
    repos.mavenCentral {
        name = 'maven-central'
    }

    repos.maven {
        name = 'maven-central-official'
        url  = 'https://repo1.maven.org/maven2'
    }

    repos.google {
        name = 'google'
    }

    repos.maven {
        name = 'gradle-plugin-portal'
        url  = 'https://plugins.gradle.org/m2'
    }

    repos.maven {
        name = 'sonatype-releases'
        url  = 'https://oss.sonatype.org/content/repositories/releases'
    }

    repos.maven {
        name = 'sonatype-public'
        url  = 'https://oss.sonatype.org/content/groups/public'
    }
}

def addAliyunRepos = { repos ->
    repos.maven {
        name = 'aliyun-central'
        url  = 'https://maven.aliyun.com/repository/central'
        content {
            excludeGroupByRegex 'com\\.github\\.ben-manes\\..*'
            excludeGroupByRegex 'gradle\\.plugin\\..*'
        }
    }

    repos.maven {
        name = 'aliyun-jcenter'
        url  = 'https://maven.aliyun.com/repository/jcenter'
        content {
            excludeGroupByRegex 'gradle\\.plugin\\..*'
        }
    }

    repos.maven {
        name = 'aliyun-google'
        url  = 'https://maven.aliyun.com/repository/google'
        content {
            includeGroupByRegex 'com\\.google\\..*'
            includeGroupByRegex 'androidx\\..*'
            includeGroupByRegex 'com\\.android\\..*'
            includeGroup 'com.android.tools.build'
            includeGroup 'com.android.tools'
        }
    }

    repos.maven {
        name = 'aliyun-gradle-plugin'
        url  = 'https://maven.aliyun.com/repository/gradle-plugin'
        content {
            includeGroupByRegex 'org\\.gradle\\..*'
            includeGroupByRegex 'com\\.gradle\\..*'
        }
    }
}

def configureRepos = { repos ->
    repos.clear()
    addOfficialRepos(repos)
    addAliyunRepos(repos)
}

// 官方源置顶，保留项目特殊仓库，阿里云兜底
def fixRepos = { proj ->
    // 1. 收集非阿里云的仓库（保留项目特殊仓库，如 knn 本地仓库）
    def keepRepos = proj.repositories.findAll { repo ->
        try {
            !(repo.hasProperty('url') && repo.url?.toString()?.contains('maven.aliyun.com'))
        } catch (Throwable ignored) {
            true
        }
    }.toList()

    // 2. 全清
    proj.repositories.clear()

    // 3. 官方源置顶
    proj.repositories {
        addOfficialRepos(delegate)
    }

    // 4. 项目原有特殊仓库加回（排官方源之后）
    keepRepos.each { repo ->
        try {
            proj.repositories.add(repo)
        } catch (Throwable ignored) {}
    }

    // 5. 阿里云兜底
    proj.repositories {
        addAliyunRepos(delegate)
    }
}

// ─────────────────────────────────────────────
// settings 阶段
// ─────────────────────────────────────────────
gradle.settingsEvaluated { settings ->
    settings.pluginManagement {
        repositories {
            configureRepos(delegate)
        }
    }

    try {
        settings.dependencyResolutionManagement {
            def modeClass = Class.forName('org.gradle.api.artifacts.dsl.RepositoriesMode')
            // PREFER_PROJECT：项目自己声明的仓库优先，settings 仓库作为补充
            // 避免 PREFER_SETTINGS 屏蔽 knn 等插件的特殊仓库声明
            def preferProject = modeClass.getField('PREFER_PROJECT').get(null)
            repositoriesMode.set(preferProject)
            repositories {
                configureRepos(delegate)
            }
        }
    } catch (Throwable ignored) {
        // Gradle < 6.8 不支持，忽略
    }
}

// ─────────────────────────────────────────────
// 所有项目
// ─────────────────────────────────────────────
allprojects {
    tasks.withType(JavaCompile).configureEach {
        options.encoding = 'UTF-8'
    }
    tasks.withType(GroovyCompile).configureEach {
        options.encoding = 'UTF-8'
    }
    tasks.withType(Javadoc).configureEach {
        options.encoding = 'UTF-8'
        options.charSet  = 'UTF-8'
    }

    buildscript {
        repositories {
            configureRepos(delegate)
        }
    }

    afterEvaluate { proj ->
        fixRepos(proj)
    }

    configurations.configureEach {
        resolutionStrategy {
            cacheDynamicVersionsFor 10, 'minutes'
            cacheChangingModulesFor  5, 'minutes'
        }
    }
}

// ─────────────────────────────────────────────
// 构建诊断日志（--info 模式下可见）
// ─────────────────────────────────────────────
gradle.projectsEvaluated {
    rootProject.allprojects { proj ->
        proj.logger.info "==> [${proj.name}] 仓库列表:"
        proj.repositories.each { repo ->
            try {
                if (repo.hasProperty('url') && repo.url != null) {
                    proj.logger.info "    - ${repo.name}: ${repo.url}"
                }
            } catch (ignored) {
                proj.logger.info "    - ${repo.name}: (url 不可访问)"
            }
        }
    }
}